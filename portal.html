  async function saveLeadEditor() {
    var id = document.getElementById('edId').value;
    var leadCatVal = (document.getElementById('edLeadCat')||{}).value || 'fixmy';
    var isNSSave = leadCatVal === 'new_solar';
    var itemsRaw = (document.getElementById('edInvItems').value||'').trim();
    var items = null;
    if (itemsRaw) { try { items=JSON.parse(itemsRaw); } catch(e){ alert('Invalid JSON in line items'); return; } }
    var apptDateVal = document.getElementById('edApptDate').value;
    var apptTimeVal = document.getElementById('edApptTime').value;
    var apptISO = (apptDateVal && apptTimeVal) ? new Date(apptDateVal+'T'+apptTimeVal).toISOString() : (apptDateVal ? new Date(apptDateVal).toISOString() : null);
    var cRec = adminCustomers.find(function(x){return x.id===id;})||{};

    var soldTypeVal, stepVal, diagDate, instDate, solarStatusVal;
    if (isNSSave) {
      var edSolarStatusEl = document.getElementById('edSolarStatus');
      solarStatusVal = (edSolarStatusEl ? edSolarStatusEl.value : null) || (cRec.solar_status || 'ns_eval_booked');
      soldTypeVal = NS_JOB_KEYS.indexOf(solarStatusVal) >= 0 ? 'new_solar' : null;
      stepVal = cRec.step || 1;
      diagDate = apptISO || cRec.diagnostic_date || null;
      instDate = cRec.install_date || null;
    } else {
      stepVal = parseInt((document.getElementById('edStep')||{}).value)||1;
      diagDate = stepVal >= 7 ? (cRec.diagnostic_date||null) : apptISO;
      instDate = stepVal >= 7 ? apptISO : (cRec.install_date||null);
      soldTypeVal = (document.getElementById('edSoldType')||{}).value||null;
      if (stepVal >= 3 && !soldTypeVal) soldTypeVal = 'diagnostic';
      solarStatusVal = null;
    }

    var updates = {
      lead_category: leadCatVal,
      sold_type: soldTypeVal,
      solar_status: solarStatusVal,
      first_name: document.getElementById('edFirst').value||null,
      last_name: document.getElementById('edLast').value||null,
      email: document.getElementById('edEmail').value||null,
      phone: document.getElementById('edPhone').value||null,
      address: document.getElementById('edAddr').value||null,
      system_size: (document.getElementById('edSys')||{}).value||null,
      utility: document.getElementById('edUtil').value||null,
      monthly_bill: document.getElementById('edBill').value||null,
      step: stepVal,
      diagnostic_date: diagDate,
      install_date: instDate,
      install_type: document.getElementById('edInstType').value||null,
      invoice_status: document.getElementById('edInvSt').value,
      invoice_number: document.getElementById('edInvNum').value||null,
      invoice_amount: parseFloat(document.getElementById('edInvAmt').value)||null,
      invoice_url: document.getElementById('edInvUrl').value||null,
      invoice_items: items,
      agreement_status: document.getElementById('edAgSt').value,
      agreement_url: document.getElementById('edAgUrl').value||null,
      notes: document.getElementById('edNotes').value||null,
      assigned_ops: document.getElementById('edAssignedOps').value==='none'?null:document.getElementById('edAssignedOps').value||null,
      arrival_end: document.getElementById('edArrivalEnd').value||null,
      nem_status: document.getElementById('edNem') ? document.getElementById('edNem').value||null : (cRec.nem_status||null),
      ops_payout_status: document.getElementById('edOpsPayout').value||null,
      lead_source: document.getElementById('edLeadSource').value||null,
      title_owner: (document.getElementById('edTitleOwner')||{}).value||null,
      apn: (document.getElementById('edApn')||{}).value||null
    };
    if (!isNSSave) {
      updates.deposit_status = (document.getElementById('edDepSt')||{}).value||null;
      updates.deposit_amount = parseFloat((document.getElementById('edDepAmt')||{}).value)||null;
      updates.ops_milestone1_amount = parseFloat((document.getElementById('edOpsMile1Amt')||{}).value)||null;
      updates.ops_milestone1_status = (document.getElementById('edOpsMile1St')||{}).value||null;
    }
    try {
      var client=supabase.createClient(SUPA_URL,SUPA_KEY);
      var { error }=await client.from('customers').update(updates).eq('id',id);
      if (error) throw error;
      var idx=adminCustomers.findIndex(function(x){return x.id===id;});
      if (idx>-1) adminCustomers[idx]=Object.assign(adminCustomers[idx],updates);
      var savedEl=document.getElementById('edSaved'); if(savedEl) savedEl.style.display='inline';
      setTimeout(function(){ var el=document.getElementById('edSaved'); if(el) el.style.display='none'; closeLeadEditor(); renderAdminView(adminView); },1500);
    } catch(e) { alert('Save failed: '+e.message); }
  }

  // True-Up ↔ Monthly Bill bidirectional sync
  function nlSyncTrueUp() {
    var v = parseFloat(document.getElementById('nlTrueUp').value);
    var hint = document.getElementById('nlTrueUpHint');
    var el = document.getElementById('nlBill');
    if (!isNaN(v) && v > 0) {
      var mo = Math.round(v / 12);
      if (el) el.value = mo;
      var bHint = document.getElementById('nlBillHint');
      if (bHint) bHint.textContent = '\u2248 $' + mo + '/mo (from true-up \xf7 12)';
      if (hint) hint.textContent = '';
    } else {
      if (hint) hint.textContent = '';
      var bHint2 = document.getElementById('nlBillHint');
      if (bHint2 && !document.getElementById('nlBill').value) bHint2.textContent = '';
    }
  }
  function nlSyncBill() {
    var v = parseFloat(document.getElementById('nlBill').value);
    var hint = document.getElementById('nlBillHint');
    var el = document.getElementById('nlTrueUp');
    if (!isNaN(v) && v > 0) {
      var yr = Math.round(v * 12);

  async function checkTitleOwner(address, lat, lng) {
    var wrap = document.getElementById('nlTitleWrap');
    var body = document.getElementById('nlTitleBody');
    if (!wrap || !body || !address) return;
    wrap.style.display = 'block';
    body.innerHTML = '<span style="font-size:0.75rem;color:#888;">Checking parcel data…</span>';
    document.getElementById('nlTitleOwner').value = '';
    document.getElementById('nlTitleApn').value   = '';
    document.getElementById('nlTitleConfirmed').value = '';
    var owner = null, apn = null, sourceLabel = '';
    var sourceLabels = { regrid_latlon: 'Regrid', regrid_search: 'Regrid', regrid_typeahead: 'Regrid', sandag: 'SD County Assessor', sd_county: 'SD County GIS' };
    try {
      var payload = { address: address };
      if (lat != null && lng != null) { payload.lat = lat; payload.lng = lng; }
      var rgResp = await fetch('/.netlify/functions/regrid-lookup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (rgResp.ok) {
        var rgData = await rgResp.json();
        if (rgData.owner) {
          owner       = rgData.owner;
          apn         = rgData.apn || null;
          sourceLabel = sourceLabels[rgData.source] || 'Parcel Data';
        }
      }
    } catch(e) {
      body.innerHTML = '<span style="font-size:0.75rem;color:#ef4444;">Lookup error: ' + (e.message||'unknown') + '</span>';
      return;
    }
    if (owner) {
      document.getElementById('nlTitleOwner').value = owner;
      document.getElementById('nlTitleApn').value   = apn || '';
      body.innerHTML =
        '<div style="font-size:0.82rem;font-weight:700;color:#F3EDE3;margin-bottom:6px;">' + owner + '</div>' +
        (apn ? '<div style="font-size:0.68rem;color:#666;margin-bottom:8px;">APN: ' + apn +
          ' &nbsp;&middot;&nbsp; <span style="color:#555;">' + sourceLabel + '</span></div>' : '') +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
          '<button type="button" onclick="nlTitleConfirm(true)" id="nlTitleConfirmBtn" ' +
            'style="padding:5px 14px;border:none;border-radius:100px;background:#8DC63F;color:#1A1A1A;font-size:0.72rem;font-weight:700;cursor:pointer;">&#10003; Confirmed on Title</button>' +
          '<button type="button" onclick="nlTitleConfirm(false)" ' +
            'style="padding:5px 14px;border:1px solid rgba(239,68,68,0.4);border-radius:100px;background:transparent;color:#ef4444;font-size:0.72rem;font-weight:700;cursor:pointer;">&#10005; Mismatch — Note</button>' +
        '</div>' +
        '<div id="nlTitleNote" style="display:none;margin-top:8px;">' +
          '<input type="text" id="nlTitleNoteText" placeholder="e.g. Spouse name, trust, different owner" ' +
            'style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:8px 10px;color:#F3EDE3;font-size:0.78rem;outline:none;"/>' +
        '</div>';
    } else {

    }
  }

  async function loadUploadStatus(custId){

      var client=supabase.createClient(SUPA_URL,SUPA_KEY);
      // Check both uploads table and job_photos for status
      var resp=await client.from('job_photos')
        .select('label,quality_flag,quality_note')

        var labelToType={'Utility Bill':'bill','Main Panel':'panel','Inverter':'inverter'};

  async function handleUpload(type,input){
    if(!input.files||!input.files[0]||!currentUser) return;
    var el=document.getElementById('ust-'+type);
    if(el){el.textContent='Uploading...';el.className='upload-status';}
    try{
      var client=supabase.createClient(SUPA_URL,SUPA_KEY);
      var file=input.files[0];
      var safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      var custId=String(currentUser.id||'anon');

      // Map upload type to Quoya category
      var categoryMap = {
        'bill':     'Utility Bill',
        'inverter': 'Inverter',
        'serial':   'Inverter',
        'panel':    'Main Panel'
      };
      var category = categoryMap[type] || 'Additional Photos';

      // 1 — Upload to job_photos storage bucket
      var path='jobs/'+custId+'/customer_'+type+'_'+Date.now()+'_'+safeName;
      var {data,error}=await client.storage.from('job_photos').upload(path,file,{upsert:true});
      if(error){if(el) el.textContent='Error: '+(error.message||'Upload failed');return;}

      // 2 — Get public URL
      var publicUrl=client.storage.from('job_photos').getPublicUrl(path).data.publicUrl;

      // 3 — Run Quoya AI label + quality check
      if(el){el.textContent='Quoya reviewing...';el.className='upload-status';}
      var aiResult = await quoyaAssessPhoto(file, category);

      // 4 — Write to job_photos table (visible to all roles)
      await client.from('job_photos').insert({
        job_id:       custId,
        customer_id:  custId,
        url:          publicUrl,
        path:         path,
        label:        aiResult.label,
        uploaded_by:  'customer',
        quality_flag: aiResult.flag,
        quality_note: aiResult.note,
        uploaded_at:  new Date().toISOString()
      });

      // 5 — Also update uploads table for status tracking
      await client.from('uploads').upsert({
        customer_id:  currentUser.id,
        upload_type:  type,
        file_name:    file.name,
        status:       aiResult.flag === 'good' ? 'uploaded' : 'needs_retake'
      },{onConflict:'customer_id,upload_type'});

      // 6 — Show result with quality feedback
      if(el){
        if(aiResult.flag === 'good'){
          el.textContent='✓ Uploaded';
          el.className='upload-status ok';
        } else {
          el.innerHTML='⚠ Needs Retake<br><span style="font-size:0.65rem;color:#ffaa00;font-weight:400;">'+aiResult.note+'</span>';
          el.className='upload-status';
          el.style.background='rgba(255,170,0,0.12)';
          el.style.color='#ffaa00';
          el.style.borderRadius='6px';
          el.style.padding='6px 10px';
          el.style.lineHeight='1.5';
        }
      }

    }catch(e){if(el) el.textContent='Failed: '+(e.message||'Unknown error');}
  }

      wrap.innerHTML='<div class="card" style="margin-top:16px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><strong>&#9728;&#65039; Rooftop Solar Intelligence</strong><span style="font-size:0.62rem;color:#555;">Google Solar API</span></div><img src="'+sat+'" style="width:100%;border-radius:8px;max-height:180px;object-fit:cover;" onerror="this.style.display=\'none\'"/>'+stats+'</div>';

  // ── AUTO LOGIN ─────────────────────────────────────────────────────────────
  window.addEventListener('load', async function() {
    // Restore rep/tech session
    var saved = sessionStorage.getItem('user');
    if (saved) {
      try {
        var u = JSON.parse(saved);
        if (u.isAdmin || u.role === 'admin') {
          currentUser = {isAdmin:true, email:ADMIN_EMAIL};
          loadAdminDashboard(); return;
        }
        if (u.isOps || u.role === 'ops') {
          var o = OPS_PARTNERS.find(function(x){ return x.id===u.id; }) || u;
          loadOpsDashboard(o); return;
        }
        if (u.isTech || u.role === 'tech') {
          var t = TECHS.find(function(x){ return x.id===u.id; }) || u;
          loadTechDashboard(t); return;
        }
        if (u.isRep || u.role === 'rep') {
          var r = SALES_REPS.find(function(x){ return x.id===u.id; }) || u;
          loadRepDashboard(r); return;
        }
        if (u.isSetter || u.role === 'setter') {
          var s = SETTERS.find(function(x){ return x.id===u.id; }) || u;
          loadSetterDashboard(s); return;
        }
        // Customer — re-fetch fresh data from DB so updates (invoice, step, etc.) are current
        currentUser = u;
        try {
          var rc = supabase.createClient(SUPA_URL, SUPA_KEY);
          var fr = await rc.from('customers').select('*').eq('id', u.id).limit(1);
          if (!fr.error && fr.data && fr.data.length) {
            var freshUser = fr.data[0];
            sessionStorage.setItem('user', JSON.stringify(freshUser));
            loadCustomerDashboard(freshUser);
          } else {
            loadCustomerDashboard(u);
          }
        } catch(e) { loadCustomerDashboard(u); }
        return;
      } catch(e) { sessionStorage.clear(); }
    }
    var p=new URLSearchParams(location.search); var ue=p.get('email'),uc=p.get('code');
    if(ue&&uc){
      // Magic link auto-login with full diagnostics
      var cleanEmail = decodeURIComponent(ue).toLowerCase().trim();
      var cleanUc = uc.trim().replace(/[^0-9]/g,'');
      if(cleanUc.length===11&&cleanUc.charAt(0)==='1') cleanUc=cleanUc.slice(1);
      if(cleanUc.length>11) cleanUc=cleanUc.slice(-10);

      // Show loading state on login box
      var lb = document.getElementById('loginBox');
      if(lb) lb.innerHTML = '<div style="text-align:center;padding:32px 20px;">' +
        '<div style="font-size:1.4rem;margin-bottom:12px;">☀️</div>' +
        '<div style="font-weight:700;font-size:1rem;margin-bottom:6px;">Solar<span style="color:#8DC63F">.</span>Review</div>' +
        '<p style="color:#aaa;font-size:0.8rem;margin-bottom:20px;">Loading your portal...</p>' +
        '<div id="mlStatus" style="font-size:0.75rem;color:#666;"></div>' +
        '</div>';

      function mlStatus(msg) {
        var el = document.getElementById('mlStatus');
        if(el) el.textContent = msg;
      }

      async function magicLinkLogin() {
        try {
          mlStatus('Connecting...');

          // Validate inputs
          if(!cleanEmail || !cleanEmail.includes('@')) {
            showMagicLinkError('Invalid link — email address missing or malformed.',
              'Try opening the link from your original email again, or contact Solar Review at (619) 722-9268.');
            return;
          }
          if(!cleanUc || cleanUc.length < 10) {
            showMagicLinkError('Invalid link — access code missing or too short.',
              'Try opening the link from your original email again, or contact Solar Review at (619) 722-9268.');
            return;
          }

          mlStatus('Looking up your account...');
          var client;
          try { client = supabase.createClient(SUPA_URL, SUPA_KEY); }
          catch(e) {
            showMagicLinkError('Could not connect to Solar Review servers.',
              'Check your internet connection and try again. If the issue continues, call us at (619) 722-9268.');
            return;
          }

          function normalize(ph) {
            var d=(ph||'').replace(/[^0-9]/g,'');
            if(d.length===11&&d.charAt(0)==='1') d=d.slice(1);
            if(d.length>11) d=d.slice(-10);
            return d;
          }

          // Use .limit(1) instead of .single() so duplicate records don't break magic-link login
          var resp = await client.from('customers').select('*').eq('email', cleanEmail).limit(1);

          var c = null;
          if(!resp.error && resp.data && resp.data.length) {
            c = resp.data[0];
          } else {
            // Email not found — fallback: look up by normalized access_code (handles phone-only records)
            var normCode = normalize(cleanUc);
            if(normCode) {
              var codeResp = await client.from('customers').select('*').eq('access_code', normCode).limit(1);
              if(!codeResp.error && codeResp.data && codeResp.data.length) {
                c = codeResp.data[0];
                // Backfill email on the record so future logins work by email
                if(cleanEmail && !c.email) {
                  client.from('customers').update({email: cleanEmail}).eq('id', c.id).then(function(){});
                }
              }
            }
          }

          if(!c) {
            showMagicLinkError(
              'We couldn\'t find an account for ' + cleanEmail + '.',
              'This link may have been sent to a different email address. Check your inbox for a Solar Review message, or call us at (619) 722-9268.'
            );
            return;
          }

          // Code mismatch
          var match = normalize(cleanUc)===normalize(c.phone)
                   || cleanUc===c.access_code
                   || normalize(cleanUc)===normalize(c.access_code)
                   || (c.email && c.email === cleanEmail); // if we matched by email above, code already verified implicitly
          if(!match) {
            showMagicLinkError(
              'Your access link has expired or is no longer valid.',
              'This can happen if you\'ve requested a new link or your phone number changed. Call us at (619) 722-9268 or reply to your Solar Review email to get a fresh link.'
            );
            return;
          }

          // Success
          mlStatus('');
          sessionStorage.setItem('user', JSON.stringify(c));
          loadCustomerDashboard(c);

        } catch(e) {
          showMagicLinkError(
            'Something went wrong loading your portal.',
            'Error: ' + (e.message||'Unknown error') + '. Please call us at (619) 722-9268 or try again in a moment.'
          );
        }
      }

      function showMagicLinkError(title, detail) {
        var lb = document.getElementById('loginBox');
        if(lb) lb.innerHTML =
          '<div style="padding:28px 24px;">' +
            '<div style="font-size:1.2rem;font-weight:700;margin-bottom:4px;">Solar<span style="color:#8DC63F">.</span>Review</div>' +
            '<div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:16px;margin:16px 0;">' +
              '<div style="font-weight:700;color:#ef4444;font-size:0.85rem;margin-bottom:6px;">⚠ ' + title + '</div>' +
              '<div style="font-size:0.78rem;color:#aaa;line-height:1.6;">' + detail + '</div>' +
            '</div>' +
            '<div style="font-size:0.75rem;color:#666;margin-bottom:16px;">Or sign in manually:</div>' +
            '<label style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:#888;display:block;margin-bottom:6px;">Email Address</label>' +
            '<input type="email" id="emailInput" value="' + cleanEmail + '" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:13px 14px;color:#F3EDE3;font-size:0.9rem;margin-bottom:12px;outline:none;box-sizing:border-box;"/>' +
            '<label style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:#888;display:block;margin-bottom:6px;">Access Code</label>' +
            '<input type="password" id="codeInput" placeholder="Your 10-digit phone number" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:13px 14px;color:#F3EDE3;font-size:0.9rem;margin-bottom:16px;outline:none;box-sizing:border-box;"/>' +
            '<button id="loginBtn" onclick="handleLogin()" style="width:100%;background:#8DC63F;color:#1A1A1A;border:none;border-radius:100px;padding:15px;font-size:0.9rem;font-weight:700;cursor:pointer;">Try Again</button>' +
            '<div class="err" id="errMsg" style="display:none;"></div>' +
            '<div style="text-align:center;margin-top:16px;"><a href="tel:6197229268" style="color:#8DC63F;font-size:0.78rem;font-weight:600;">📞 Call Solar Review (619) 722-9268</a></div>' +
          '</div>';
      }

      magicLinkLogin();
      return;
    }
    // session restore handled above
  });
</script>

  // ── UNIFIED SALES / TECH DASHBOARD ────────────────────────────────────────
  async function loadSalesDashboard(person, config) {
    config = config || {};
    var roleLabel = config.roleLabel || 'Sales';
    var showFieldJobs = !!config.showFieldJobs;

    // Agreement gate — Supabase is authoritative; localStorage used as offline fallback
    var agreementSigned = !!person.agreementSigned;
    // If rep just signed this session, trust it immediately (avoids Supabase re-check race)
    var justSigned = false;
    try { justSigned = !!sessionStorage.getItem('repAgreementJustSigned_' + person.id); } catch(e) {}
    if (justSigned) {
      agreementSigned = true;
    } else {
      try {
        var agc = supabase.createClient(SUPA_URL, SUPA_KEY);
        var agr = await agc.from('rep_agreements').select('id').eq('rep_id', person.id).maybeSingle();
        if (agr.data) {
          agreementSigned = true;
          try { localStorage.setItem('repAgreement_' + person.id, 'supabase'); } catch(e) {}
        } else if (!agr.error) {
          // Supabase returned no record — check for a local signed record before clearing
          var localRec = null;
          try { localRec = localStorage.getItem('repAgreement_' + person.id); } catch(e) {}
          if (localRec && localRec !== 'supabase') {
            // Local signed record exists but not in Supabase — let them through and re-sync
            agreementSigned = true;
            var rParts = localRec.split('|');
            var rTs = rParts[0], rName = rParts.slice(1).join('|');
            if (rName) {
              agc.from('rep_agreements').insert({rep_id:person.id, rep_name:person.name, rep_legal_name:rName, signed_at:rTs, source:'resync'}).then(function(res){
                if (!res.error) { try { localStorage.setItem('repAgreement_'+person.id,'supabase'); } catch(ex){} }
              });
            }
          } else {
            // Truly no record (admin reset or never signed) — clear cache
            agreementSigned = false;
            try { localStorage.removeItem('repAgreement_' + person.id); } catch(e) {}
          }
        } else {
          // Supabase unreachable — fall back to localStorage so rep isn't locked out offline
          try { if (localStorage.getItem('repAgreement_' + person.id)) agreementSigned = true; } catch(e) {}
        }
      } catch(e) {
        try { if (localStorage.getItem('repAgreement_' + person.id)) agreementSigned = true; } catch(e2) {}
      }
    }

    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('userName').textContent = person.name + ' \xB7 ' + (agreementSigned ? roleLabel : 'Agreement Review');

    if (!agreementSigned) {
      window.signRepAgreement = async function() {
        var repName = (document.getElementById('agName') ? document.getElementById('agName').value : '').trim();
        var checked = !!(document.getElementById('agCheck') && document.getElementById('agCheck').checked);
        if (!repName) { alert('Please type your full legal name to sign.'); return; }
        if (!checked) { alert('Please check the box confirming you have read and agree to the terms.'); return; }
        var ts = new Date().toISOString();
        try { localStorage.setItem('repAgreement_' + person.id, ts + '|' + repName); } catch(e) {}
        try { sessionStorage.setItem('repAgreementJustSigned_' + person.id, '1'); } catch(e) {} // bypass re-check this session
        try {
          fetch(GHL_WEBHOOK, {method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({firstName:person.name,lastName:repName,source:'Rep Agreement Signed',
              tags:['rep-agreement-signed'],customField:{rep_id:person.id,rep_legal_name:repName,signed_at:ts}})
          });
        } catch(e){}
        try {
          var agClient = supabase.createClient(SUPA_URL, SUPA_KEY);
          var agPayload = {rep_id:person.id, rep_name:person.name, rep_legal_name:repName, signed_at:ts, source:'self-signed'};
          var {error: iErr} = await agClient.from('rep_agreements').insert(agPayload);
          if (iErr) {
            console.error('[Agreement] INSERT failed ('+iErr.code+'):', iErr.message);
            var {error: uErr} = await agClient.from('rep_agreements').update(agPayload).eq('rep_id', person.id);
            if (uErr) {
              console.error('[Agreement] UPDATE also failed ('+uErr.code+'):', uErr.message);
              // Still signed locally via sessionStorage — they can continue this session
            } else {
              try { localStorage.setItem('repAgreement_' + person.id, 'supabase'); } catch(ex) {}
            }
          } else {
            try { localStorage.setItem('repAgreement_' + person.id, 'supabase'); } catch(ex) {}
          }
        } catch(e){ console.warn('[Agreement] Exception:', e); }
        loadSalesDashboard(person, config);
      };
      document.getElementById('dashBody').innerHTML = buildRepAgreementHTML();
      return;
    }

    document.getElementById('dashBody').innerHTML = '<p style="color:#aaa;padding:20px 0;">Loading...</p>';

    var client;
    try { client = supabase.createClient(SUPA_URL, SUPA_KEY); }
    catch(e) { document.getElementById('dashBody').innerHTML = '<p style="color:#ef4444;">Database error.</p>'; return; }

    // Fetch this person's accounts by rep_id
    var r1 = await client.from('customers').select('*').eq('rep_id', person.id).order('created_at', {ascending:false});
    var allRecords = r1.data || [];
    allRecords.sort(function(a,b){ return new Date(b.created_at)-new Date(a.created_at); });

    var myLeads      = allRecords.filter(function(r){ return !r.sold_type; });
    var myJobs       = allRecords.filter(function(r){ return !!r.sold_type; });
    var myFixmyLeads = myLeads.filter(function(r){ return r.lead_category !== 'new_solar'; });
    var myNSLeads    = myLeads.filter(function(r){ return r.lead_category === 'new_solar'; });

    var fieldJobs = [];

      var fr = await client.from('customers').select('*').eq('assigned_ops', person.id).order('diagnostic_date', {ascending:true});
      fieldJobs = fr.data || [];

    var salesView = sessionStorage.getItem('salesView_'+person.id) || 'leads';

    window.savesSalesEdit = async function() {
      try {
        var id = document.getElementById('seId').value;
        if (!id) { alert('Lead ID missing — please close and reopen the editor.'); return; }
        var cat = document.getElementById('seLeadCat').value || 'fixmy';
        var solarStEl = document.getElementById('seSolarStatus');
        var solarSt = cat === 'new_solar' ? ((solarStEl ? solarStEl.value : '') || 'ns_eval_booked') : null;
        var soldType = (cat === 'new_solar' && solarSt && NS_JOB_KEYS.indexOf(solarSt) >= 0) ? 'new_solar' : null;
        var billRaw = document.getElementById('seBill').value;
        var updates = {
          lead_category: cat,
          solar_status: solarSt,
          sold_type: soldType,
          first_name: document.getElementById('seFirst').value || null,
          last_name: document.getElementById('seLast').value || null,
          phone: document.getElementById('sePhone').value || null,
          email: document.getElementById('seEmail').value || null,
          address: document.getElementById('seAddr').value || null,
          monthly_bill: billRaw ? parseFloat(billRaw) : null,
          notes: document.getElementById('seNotes').value || null,
          lead_source: (document.getElementById('seLeadSource')||{}).value || null,
        };
        var c2 = supabase.createClient(SUPA_URL, SUPA_KEY);
        var res = await c2.from('customers').update(updates).eq('id', id);
        if (res.error) { alert('Save failed: ' + res.error.message); return; }
        var rec = allRecords.find(function(r){ return r.id === id; });
        if (rec) Object.assign(rec, updates);
        var sv = document.getElementById('seSaved'); if (sv) sv.style.display = 'inline';
        setTimeout(function() { if (typeof window.salesRefresh === 'function') window.salesRefresh(); }, 1200);
      } catch(e) { alert('Save error: ' + e.message); }
    };

  // placeholder — commission view available via Jobs tab
  function calcRepCommission(lead) {
    var amt = parseFloat(lead.invoice_amount) || 0;
    if (!amt && lead.step >= 8) amt = 500;
    var rate = 0.10;
    if (lead.install_type === 'battery') rate = 0.08;
    if (lead.install_type === 'diagnostic') rate = 0.15;
    return Math.round(amt * rate);
  }

        var flaggedHtml = '';
        if (flaggedPhotos.length) {

            flaggedPhotos.map(function(p){

        }).join('');

        h += '<div class="tech-job-card" data-jid="' + jid + '">' +
          '<div class="tech-job-header">' +
            '<div><div class="tech-job-name">' + (job.first_name||'') + ' ' + (job.last_name||'') + '</div>' +

          '<div class="tech-actions">' +
            (job.phone ? '<a href="tel:' + (job.phone||'').replace(/\D/g,'') + '" class="tech-btn tech-btn-call">&#128222; Call</a>' : '') +

            (job.address ? '<a href="https://maps.apple.com/?q=' + encodeURIComponent(job.address) + '" target="_blank" class="tech-btn tech-btn-secondary">&#128506; Directions</a>' : '') +
            '<button class="tech-btn tech-btn-primary" onclick="opsToggleJob(this.closest(\'[data-jid]\').dataset.jid)">' + (isOpen?'&#9650; Close':'&#9660; Open Job') + '</button>' +
          '</div>';

        if (isOpen) {
          // Satellite + Solar Intelligence panel (populated async from cache or fresh fetch)
          h += '<div id="opssolar_' + jid + '" style="margin-bottom:12px;">' +
            '<div style="background:#eeeee8;border:1px solid rgba(0,0,0,0.09);border-radius:10px;padding:14px;text-align:center;font-size:0.72rem;color:#777;">🛰 Loading rooftop data...</div>' +
            '</div>';

          // Admin briefing notes
          if (job.field_notes) {
            h += '<div style="background:rgba(255,165,0,0.1);border:1px solid rgba(200,120,0,0.25);border-radius:8px;padding:12px;margin-bottom:8px;font-size:0.82rem;line-height:1.6;color:#1A1A1A;">' +
              '<span style="color:#b06a00;font-weight:700;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;">📋 Admin Notes</span><br/>' +
              job.field_notes + '</div>';
          }
          // Tech notes from field
          if (job.job_notes || job.notes) {
            h += '<div style="background:rgba(141,198,63,0.1);border:1px solid rgba(100,160,30,0.3);border-radius:8px;padding:12px;margin-bottom:12px;font-size:0.82rem;line-height:1.6;color:#1A1A1A;">' +
              '<span style="color:#3d6b12;font-weight:700;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;">📝 Tech Notes</span><br/>' +
              (job.job_notes || job.notes) + '</div>';
          }

          // System info
          var ic = 'background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:10px;padding:12px;';
          h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">' +
            '<div style="'+ic+'"><div class="info-label">System Size</div><div class="info-val" style="color:#1A1A1A;">' + (job.system_size||'Unknown') + '</div></div>' +
            '<div style="'+ic+'"><div class="info-label">Utility</div><div class="info-val" style="color:#1A1A1A;">' + (job.utility||'Unknown') + '</div></div>' +
            '<div style="'+ic+'"><div class="info-label">Job Type</div><div class="info-val" style="color:#1A1A1A;">' + (job.install_type||'Diagnostic') + '</div></div>' +
            '<div style="'+ic+'"><div class="info-label">NEM Status</div><div class="info-val" style="color:#1A1A1A;">' + (job.nem_status||'Unknown') + '</div></div>' +
          '</div>' +
          (function(){
            var inv = job.invoice_status;
            if (!inv || inv === 'none') return '';
            var clr = inv === 'paid' ? '#3d6b12' : inv === 'overdue' ? '#c0392b' : '#b06a00';
            var bg  = inv === 'paid' ? 'rgba(141,198,63,0.12)' : inv === 'overdue' ? 'rgba(192,57,43,0.12)' : 'rgba(255,170,0,0.1)';
            var bdr = inv === 'paid' ? 'rgba(141,198,63,0.35)' : inv === 'overdue' ? 'rgba(192,57,43,0.3)' : 'rgba(255,170,0,0.3)';
            var lbl = inv === 'paid' ? '&#10003; Invoice Paid' : inv === 'overdue' ? '&#9888; Invoice Overdue' : inv === 'pending' ? '&#8987; Invoice Pending' : inv === 'sent' ? 'Invoice Sent' : inv.charAt(0).toUpperCase()+inv.slice(1);
            return '<div style="background:'+bg+';border:1px solid '+bdr+';border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:0.8rem;font-weight:700;color:'+clr+';">Diagnostic Invoice: '+lbl+'</div>';
          }()) +
          (function(){
            var dep = job.deposit_status, m1 = job.ops_milestone1_status;
            if ((!dep || dep === 'none') && (!m1 || m1 === 'none')) return '';
            var row = '<div style="background:rgba(255,255,255,0.7);border:1px solid rgba(0,0,0,0.1);border-radius:10px;padding:12px 14px;margin-bottom:12px;">' +
              '<div style="font-size:0.65rem;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">&#128178; Payment Status</div>';
            if (dep && dep !== 'none') {
              var dClr = dep==='paid'?'#3d6b12':dep==='pending'?'#b06a00':'#555';
              var dBg  = dep==='paid'?'rgba(141,198,63,0.12)':dep==='pending'?'rgba(255,170,0,0.1)':'rgba(0,0,0,0.04)';
              var dBdr = dep==='paid'?'rgba(141,198,63,0.3)':dep==='pending'?'rgba(255,170,0,0.3)':'rgba(0,0,0,0.1)';
              var dLbl = dep==='paid'?'&#10003; Deposit Collected':dep==='pending'?'&#8987; Processing / Pending':'Invoice Sent';
              var dAmt = job.deposit_amount ? ' &mdash; $' + parseFloat(job.deposit_amount).toLocaleString() : '';
              row += '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:7px;background:'+dBg+';border:1px solid '+dBdr+';margin-bottom:6px;">' +
                '<span style="font-size:0.78rem;color:#444;">Customer &#8594; Solar Review</span>' +
                '<span style="font-size:0.78rem;font-weight:700;color:'+dClr+';">'+dLbl+dAmt+'</span></div>';
            }
            if (m1 && m1 !== 'none') {
              var mClr = m1==='paid'?'#3d6b12':'#c0392b';
              var mBg  = m1==='paid'?'rgba(141,198,63,0.12)':'rgba(192,57,43,0.07)';
              var mBdr = m1==='paid'?'rgba(141,198,63,0.3)':'rgba(192,57,43,0.25)';
              var mLbl = m1==='paid'?'&#10003; Milestone 1 Paid':'&#9711; Awaiting Payment';
              var mAmt = job.ops_milestone1_amount ? ' &mdash; $' + parseFloat(job.ops_milestone1_amount).toLocaleString() : '';
              row += '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:7px;background:'+mBg+';border:1px solid '+mBdr+';">' +
                '<span style="font-size:0.78rem;color:#444;">Solar Review &#8594; ' + ops.name + ' (Permitting)</span>' +
                '<span style="font-size:0.78rem;font-weight:700;color:'+mClr+';">'+mLbl+mAmt+'</span></div>';
            } else if (dep === 'paid' || dep === 'pending') {
              row += '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:7px;background:rgba(192,57,43,0.07);border:1px solid rgba(192,57,43,0.25);">' +
                '<span style="font-size:0.78rem;color:#444;">Solar Review &#8594; ' + ops.name + ' (Permitting)</span>' +
                '<span style="font-size:0.78rem;font-weight:700;color:#c0392b;">&#9711; Awaiting Payment</span></div>';
            }
            return row + '</div>';
          }());

          // Flagged photos warning
          h += flaggedHtml;

          // Pre-visit checklist
          h += '<div class="tech-checklist"><div class="tech-check-title">🔧 Pre-Visit Checklist</div>' + checkHtml(preChecks, 'pre') + '</div>';

          // Photo grid
          h += '<div class="tech-section-title">📸 Job Photos</div>' +
            '<div class="tech-photo-zone" onclick="this.nextElementSibling.click()" ' +
            'ondragover="event.preventDefault();this.classList.add(\'dragover\')" ' +
            'ondragleave="this.classList.remove(\'dragover\')" ' +
            'ondrop="this.classList.remove(\'dragover\');handleOpsDrop(event,this.closest(\'[data-jid]\').dataset.jid)">' +
            '<div class="tech-photo-icon">📷</div>' +
            '<div class="tech-photo-label">Tap to upload on-site photos<br/><span style="font-size:0.72rem;color:#555;">Before & after shots</span></div></div>' +
            '<input type="file" accept="image/*" multiple capture="environment" style="display:none" ' +
            'onchange="setOpsJob(this.closest(\'[data-jid]\').dataset.jid);handlePhotoSelect(event)"/>' +
            (photoThumbsHtml ? '<div class="tech-photo-grid">' + photoThumbsHtml + '</div>' : '');

          // On-site + post checklists
          h += '<div class="tech-checklist" style="margin-top:12px;"><div class="tech-check-title">⚡ On-Site Checklist</div>' + checkHtml(onChecks, 'on') + '</div>';
          h += '<div class="tech-section-title">📝 Tech Notes</div>' +
            '<textarea class="tech-notes-area" data-notes-jid="' + jid + '" placeholder="Observations, issues found, materials used...">' + (job.job_notes||'') + '</textarea>' +
            '<button class="tech-save-btn" onclick="saveOpsNotes(this.previousElementSibling.dataset.notesJid)">💾 Save Notes</button>';
          h += '<div class="tech-checklist" style="margin-top:12px;"><div class="tech-check-title">✅ Post-Job Checklist</div>' + checkHtml(postChecks, 'post') + '</div>';
        }
        h += '</div>'; // end tech-job-card
      });
      h += '</div>'; // end tech-portal-wrap

      document.getElementById('dashBody').innerHTML = h;
      // Immediately repopulate solar panel from cache (survives each re-render)
      if (activeJobId && opsSolarCache[activeJobId]) {
        var _sw = document.getElementById('opssolar_' + activeJobId);
        if (_sw) _sw.innerHTML = opsSolarCache[activeJobId];
      }
      if (activeJobId) {
        currentJobId = activeJobId;
        var _opsActiveJob = jobs.find(function(j){ return j.id === activeJobId; });
        loadJobPhotos(activeJobId).then(renderOps);
        // Trigger first solar load if not yet cached
        if (_opsActiveJob && _opsActiveJob.address && !opsSolarCache[activeJobId]) {
          setTimeout(function() { loadOpsSolarPanel(_opsActiveJob.address, activeJobId); }, 250);
        }
      }
    }

    window.opsSetView = function(v) {
      opsView = v;
      sessionStorage.setItem('opsView_' + ops.id, v);
      renderOps();
    };
    window.opsToggleJob = function(jid) {
      activeJobId = (activeJobId === jid) ? null : jid;
      if (activeJobId) { currentJobId = activeJobId; loadJobPhotos(activeJobId).then(renderOps); }
      else renderOps();
    };
    window.setOpsJob   = function(jid) { currentJobId = jid; activeJobId = jid; };
    window.handleOpsDrop = function(event, jid) {
      event.preventDefault();
      currentJobId = jid; activeJobId = jid;
      uploadPhotos(Array.from(event.dataTransfer.files).filter(function(f){ return f.type.startsWith('image/'); })).then(renderOps);
    };
    window.opsToggleCheck = function(jid, key) {
      var checkKey = 'job_' + jid;
      if (!checklistState[checkKey]) checklistState[checkKey] = {};
      checklistState[checkKey][key] = !checklistState[checkKey][key];
      sessionStorage.setItem('checklist_ops_' + ops.id, JSON.stringify(checklistState));
      renderOps();
    };
    window.saveOpsNotes = async function(jid) {
      var ta = document.querySelector('[data-notes-jid="' + jid + '"]');
      var notes = ta ? ta.value : '';
      var c2 = supabase.createClient(SUPA_URL, SUPA_KEY);
      await c2.from('customers').update({job_notes: notes}).eq('id', jid);
      var btn = document.querySelector('.tech-save-btn');
      if (btn) { btn.textContent = '✓ Saved'; setTimeout(function(){ btn.textContent = '💾 Save Notes'; }, 2000); }
    };

    async function loadOpsSolarPanel(address, jid) {
      // If cached, re-inject immediately (DOM was rebuilt by renderOps)
      if (opsSolarCache[jid]) {
        var w = document.getElementById('opssolar_' + jid);
        if (w) w.innerHTML = opsSolarCache[jid];
        return;
      }
      try {
        var geo = await fetch('https://maps.googleapis.com/maps/api/geocode/json?address=' + encodeURIComponent(address) + '&key=' + GKEY);
        var gd = await geo.json();
        if (gd.status !== 'OK') { var we = document.getElementById('opssolar_' + jid); if (we) we.innerHTML = ''; return; }
        var loc = gd.results[0].geometry.location;
        var sat = 'https://maps.googleapis.com/maps/api/staticmap?center=' + encodeURIComponent(address) + '&zoom=19&size=700x220&maptype=satellite&key=' + GKEY;
        var sr = await fetch('https://solar.googleapis.com/v1/buildingInsights:findClosest?location.latitude=' + loc.lat + '&location.longitude=' + loc.lng + '&requiredQuality=LOW&key=' + GKEY);
        var s = sr.status === 200 ? (await sr.json()).solarPotential : null;
        var stats = '';
        if (s) {
          var maxKw = s.maxArrayPanelsCount ? (s.maxArrayPanelsCount * 0.4).toFixed(1) : '--';
          var sunHrs = s.maxSunshineHoursPerYear ? Math.round(s.maxSunshineHoursPerYear) : '--';
          function osStat(v,l){ return '<div style="text-align:center;background:rgba(0,0,0,0.05);border-radius:8px;padding:8px 4px;"><div style="font-size:0.9rem;font-weight:700;color:#3d6b12;">'+v+'</div><div style="font-size:0.6rem;color:#666;margin-top:2px;">'+l+'</div></div>'; }
          stats = '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;">' +
            osStat(s.maxArrayPanelsCount||'--','Max Panels') + osStat(maxKw+' kW','Max Capacity') + osStat(sunHrs+' hrs','Peak Sun/Yr') + '</div>';
        }
        var html = '<div style="background:#eeeee8;border:1px solid rgba(0,0,0,0.09);border-radius:10px;padding:12px;">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">' +
          '<span style="font-size:0.72rem;font-weight:700;color:#3d6b12;">🛰 Rooftop Solar Intelligence</span>' +
          '<span style="font-size:0.6rem;color:#888;">Google Solar API</span></div>' +
          '<img src="' + sat + '" style="width:100%;border-radius:8px;max-height:160px;object-fit:cover;" onerror="this.style.display=\'none\'"/>' +
          stats + '</div>';
        opsSolarCache[jid] = html;
        var wf = document.getElementById('opssolar_' + jid);
        if (wf) wf.innerHTML = html;
      } catch(e) {
        var wErr = document.getElementById('opssolar_' + jid);
        if (wErr) wErr.innerHTML = '';
      }
    }

    renderOps();
  }

</script>
</body>
</html>
