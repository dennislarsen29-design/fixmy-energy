  async function handleLogin() {
    var btn   = document.getElementById('loginBtn');
    var email = document.getElementById('emailInput').value.trim().toLowerCase();
    var code  = document.getElementById('codeInput').value.trim();

    // Clear previous errors
    document.getElementById('errMsg').style.display = 'none';

    // Basic validation
    if (!email) { showErr('Please enter your email address.'); return; }
    if (!code)  { showErr('Please enter your access code.'); return; }

    btn.textContent = 'Signing in…';
    btn.disabled = true;

    // ── ADMIN LOGIN (no database needed) ──
    if (email === ADMIN_EMAIL && code === ADMIN_CODE) {
      sessionStorage.setItem('user', JSON.stringify({isAdmin:true, name:'Admin'}));
      loadAdminDashboard();
      return;
    }

    // ── CUSTOMER LOGIN (needs Supabase) ──
    var client;
    try {
      client = supabase.createClient(SUPA_URL, SUPA_KEY);
    } catch(e) {
      showErr('Connection error. Please refresh the page and try again.');
      btn.textContent = 'Access My Portal';
      btn.disabled = false;
      return;
    }

    try {
      var resp = await client
        .from('customers')
        .select('*')
        .eq('email', email)
        .single();

      if (resp.error || !resp.data) {
        showErr('Email not found. Please check and try again.');
        btn.textContent = 'Access My Portal';
        btn.disabled = false;
        return;
      }

      var c = resp.data;
      // Normalize to 10 digits — handles all GHL formats:
      // +18012328301, 18012328301, (801) 232-8301, 801-232-8301
      function normalize(p) {
        var d = (p||'').trim().replace(/[^0-9]/g, '');
        if (d.length === 11 && d.charAt(0) === '1') d = d.slice(1);
        if (d.length > 11) d = d.slice(-10);
        return d;
      }
      var phoneDigits = normalize(c.phone);
      var codeDigits  = normalize(code);
      var acDigits    = normalize(c.access_code);
      var match = (codeDigits.length >= 10 && codeDigits === phoneDigits)
               || (codeDigits.length >= 10 && codeDigits === acDigits)
               || code === c.access_code
               || code === c.phone;

      if (!match) {
        showErr('Access code incorrect. Try your 10-digit phone number (digits only).');
        btn.textContent = 'Access My Portal';
        btn.disabled = false;
        return;
      }

      sessionStorage.setItem('user', JSON.stringify(c));
      loadCustomerDashboard(c);

    } catch(e) {
      showErr('An error occurred: ' + e.message + '. Please try again.');
      btn.textContent = 'Access My Portal';
      btn.disabled = false;
    }
  }

  function renderAdminView(view) {
    adminView = view;
    var c = adminCustomers;

    // Apply search filter
    if (adminSearch) {
      var q = adminSearch.toLowerCase();
      c = c.filter(function(x){
        return ((x.first_name||'')+(x.last_name||'')+(x.email||'')+(x.phone||'')+(x.address||'')).toLowerCase().includes(q);
      });
    }

    // Apply status filter
    if (adminFilter !== 'all') {
      c = c.filter(function(x){
        if (adminFilter === 'new') return !x.step || x.step <= 1;
        if (adminFilter === 'active') return x.step >= 2 && x.step <= 5;
        if (adminFilter === 'complete') return x.step >= 6;
        if (adminFilter === 'invoice') return x.invoice_status && x.invoice_status !== 'none' && x.invoice_status !== 'paid';
        if (adminFilter === 'agreement') return x.agreement_status === 'sent' || x.agreement_status === 'pending';
        return true;
      });
    }

    // Stats
    var total = adminCustomers.length;
    var active = adminCustomers.filter(function(x){ return x.step >= 2 && x.step < 6; }).length;
    var invoicePending = adminCustomers.filter(function(x){ return x.invoice_status === 'pending' || x.invoice_status === 'sent'; }).length;
    var agreementPending = adminCustomers.filter(function(x){ return x.agreement_status === 'sent' || x.agreement_status === 'pending'; }).length;

    var statsHtml = '<div class="admin-stats">' +
      adminStat(total, 'Total Leads', '#8DC63F', 'all') +
      adminStat(active, 'Active Jobs', '#4a9eff', 'active') +
      adminStat(invoicePending, 'Invoice Due', '#ffaa00', 'invoice') +
      adminStat(agreementPending, 'Awaiting Sig', '#f97316', 'agreement') +
      '</div>';

    var searchBar = '<div class="admin-toolbar">' +
      '<input type="text" id="adminSearchInput" class="admin-search" placeholder="&#128269; Search leads…" value="'+adminSearch+'" oninput="adminSearch=this.value;renderAdminView(adminView)"/>' +
      '<div class="admin-filters">' +
      filterBtn('all','All') + filterBtn('new','New') + filterBtn('active','Active') +
      filterBtn('invoice','Invoice') + filterBtn('agreement','Sig Needed') + filterBtn('complete','Complete') +
      '</div>' +
      '</div>';

    var actionsBar = '<div class="admin-actions-bar">' +
      '<button class="admin-action-btn" onclick="openNewLead()">&#43; New Lead</button>' +
      '<button class="admin-action-btn ghost" onclick="exportCSV()">&#8681; Export CSV</button>' +
      '</div>';

    var listHtml = '';
    if (!c.length) {
      listHtml = '<div style="padding:32px;text-align:center;color:#555;">No leads match this filter.</div>';

      c.forEach(function(cust) {

  async function saveLeadEditor() {
    var id = document.getElementById('edId').value;
    var itemsRaw = (document.getElementById('edInvItems').value||'').trim();
    var items = null;
    if (itemsRaw) { try { items = JSON.parse(itemsRaw); } catch(e) { alert('Invalid JSON in line items'); return; } }
    var dv = document.getElementById('edDiag').value;
    var iv = document.getElementById('edInst').value;

    var updates = {
      first_name:       document.getElementById('edFirst').value||null,
      last_name:        document.getElementById('edLast').value||null,
      email:            document.getElementById('edEmail').value||null,
      phone:            document.getElementById('edPhone').value||null,
      address:          document.getElementById('edAddr').value||null,
      system_size:      document.getElementById('edSys').value||null,
      utility:          document.getElementById('edUtil').value||null,
      monthly_bill:     document.getElementById('edBill').value||null,
      step:             parseInt(document.getElementById('edStep').value)||1,
      diagnostic_date:  dv ? new Date(dv).toISOString() : null,
      install_date:     iv ? new Date(iv).toISOString() : null,
      install_type:     document.getElementById('edInstType').value||null,
      invoice_status:   document.getElementById('edInvSt').value,
      invoice_number:   document.getElementById('edInvNum').value||null,
      invoice_amount:   parseFloat(document.getElementById('edInvAmt').value)||null,
      invoice_url:      document.getElementById('edInvUrl').value||null,
      invoice_items:    items,
      agreement_status: document.getElementById('edAgSt').value,
      agreement_url:    document.getElementById('edAgUrl').value||null,
      notes:            document.getElementById('edNotes').value||null,
    };

    try {
      var client = supabase.createClient(SUPA_URL, SUPA_KEY);
      var { error } = await client.from('customers').update(updates).eq('id', id);
      if (error) throw error;
      // Update local cache
      var idx = adminCustomers.findIndex(function(x){return x.id===id;});
      if (idx > -1) adminCustomers[idx] = Object.assign(adminCustomers[idx], updates);
      document.getElementById('edSaved').style.display = 'inline';
      setTimeout(function(){
        document.getElementById('edSaved').style.display = 'none';
        closeLeadEditor();
        renderAdminView(adminView);
      }, 1500);
    } catch(e) { alert('Save failed: '+e.message); }
  }

  // Google Places autocomplete for new lead address field
  var nlPlacesInit = false;
  function initNlPlaces() {
    var input = document.getElementById('nlAddr');
    if (!input || nlPlacesInit || typeof google === 'undefined') return;
    nlPlacesInit = true;
    var ac = new google.maps.places.Autocomplete(input, {
      types: ['address'],
      componentRestrictions: { country: 'us' }
    });
    ac.addListener('place_changed', function() {
      var place = ac.getPlace();
      if (!place.geometry) return;
      var addr = place.formatted_address || input.value;
      input._pac_selected = true;
      loadNlSatellite(addr);
      loadNlSolar(place.geometry.location.lat(), place.geometry.location.lng());
    });
  }

  async function handleUpload(type, input) {
    if (!input.files || !input.files[0] || !currentUser) return;
    var el = document.getElementById('ust-'+type);
    if (el) { el.textContent = 'Uploading…'; el.className = 'upload-status'; }
    try {
      var client = supabase.createClient(SUPA_URL, SUPA_KEY);
      var file = input.files[0];
      // Sanitize filename
      var safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      var path = (currentUser.id||'anon')+'/'+type+'_'+Date.now()+'_'+safeName;
      var { data, error } = await client.storage.from('customer-docs').upload(path, file, {upsert:true});
      if (error) {
        console.error('Upload error:', error);
        if (el) el.textContent = 'Error: ' + (error.message||'Upload failed');
        return;
      }
      // Record in uploads table
      await client.from('uploads').upsert({
        customer_id:  currentUser.id,
        upload_type:  type,
        file_name:    file.name,
        status:       'uploaded'
      }, {onConflict:'customer_id,upload_type'});
      if (el) { el.textContent = '\u2713 Uploaded'; el.className = 'upload-status ok'; }
    } catch(e) {
      console.error('Upload exception:', e);
      if (el) el.textContent = 'Failed: ' + (e.message||'Unknown error');
    }
  }

      try {
        var u = JSON.parse(saved);
        if (u.isAdmin) { currentUser={isAdmin:true,email:ADMIN_EMAIL}; loadAdminDashboard(); }
        else { currentUser=u; loadCustomerDashboard(u); }
      } catch(e) { sessionStorage.clear(); }
    }
  });
</script>
