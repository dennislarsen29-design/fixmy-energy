<!DOCTYPE html>
<!-- Solar Review Portal | Jobs Tab Update -->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <title>Solar Review — Customer Portal</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:sans-serif; background:#1A1A1A; color:#F3EDE3; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .box { width:100%; max-width:400px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:40px 32px; margin:24px; }
    h1 { font-size:1.4rem; margin-bottom:4px; }
    h1 span { color:#8DC63F; }
    p { font-size:0.8rem; color:#aaa; margin-bottom:28px; }
    label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.08em; color:#888; display:block; margin-bottom:6px; }
    input { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:13px 14px; color:#F3EDE3; font-size:0.9rem; margin-bottom:16px; outline:none; }
    input:focus { border-color:#8DC63F; }
    button { width:100%; background:#8DC63F; color:#1A1A1A; border:none; border-radius:100px; padding:15px; font-size:0.9rem; font-weight:700; cursor:pointer; margin-top:4px; }
    button:hover { opacity:0.88; }
    .err { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:10px 14px; font-size:0.78rem; color:#ef4444; margin-top:12px; display:none; }
    .hint { font-size:0.7rem; color:#666; text-align:center; margin-top:16px; }
    #dashboard { display:none; max-width:700px; width:100%; margin:24px; }
    .dash-header { background:rgba(255,255,255,0.03); border-bottom:1px solid rgba(255,255,255,0.08); padding:16px 24px; display:flex; justify-content:space-between; align-items:center; border-radius:12px 12px 0 0; }
    .dash-body { padding:24px; }
    .dash-title { font-size:1rem; font-weight:700; }
    .sign-out { font-size:0.72rem; color:#888; cursor:pointer; text-decoration:underline; background:none; border:none; width:auto; padding:0; }
    .card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:18px; margin-bottom:14px; }
    .info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:20px; }
    .info-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:14px; }
    .info-label { font-size:0.62rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:#666; margin-bottom:6px; }
    .info-val { font-size:0.88rem; font-weight:600; }
    .sect-label { font-size:0.66rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:#666; margin:20px 0 10px; }
    .timeline { display:flex; gap:0; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:14px 10px; min-width:360px; }
    .step { display:flex; flex-direction:column; align-items:center; flex:1; position:relative; }
    .step:not(:last-child)::after { content:''; position:absolute; top:13px; left:50%; width:100%; height:2px; background:rgba(255,255,255,0.08); }
    .step.done::after,.step.active::after { background:#8DC63F; }
    .step-dot { width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,0.08); color:#666; display:flex; align-items:center; justify-content:center; font-size:0.68rem; font-weight:700; position:relative; z-index:1; }
    .step.done .step-dot { background:#8DC63F; color:#1A1A1A; }
    .step.active .step-dot { background:#1A1A1A; border:2px solid #8DC63F; color:#8DC63F; }
    .step-label { font-size:0.56rem; color:#666; text-align:center; margin-top:5px; line-height:1.3; }
    .step.active .step-label { color:#8DC63F; font-weight:600; }
    .step.done .step-label { color:#aaa; }
    .upload-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:20px; }
    .upload-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:16px; }
    .upload-status { font-size:0.68rem; font-weight:600; padding:3px 10px; border-radius:100px; display:inline-block; margin-bottom:10px; background:rgba(255,255,255,0.06); color:#666; }
    .upload-status.ok { background:rgba(141,198,63,0.15); color:#8DC63F; }
    input[type=file]{display:none;}
    .btn-upload { background:#8DC63F; color:#1A1A1A; border:none; border-radius:100px; padding:8px 18px; font-size:0.72rem; font-weight:700; cursor:pointer; }
    .inv-line { display:flex; justify-content:space-between; font-size:0.78rem; padding:7px 0; border-top:1px solid rgba(255,255,255,0.06); }
    .inv-total { display:flex; justify-content:space-between; font-size:0.88rem; font-weight:700; padding-top:10px; margin-top:4px; border-top:2px solid rgba(255,255,255,0.1); }
    .inv-total-amt { color:#8DC63F; font-size:1rem; }
    .badge { font-size:0.64rem; font-weight:700; padding:4px 10px; border-radius:100px; }
    .badge-paid,.badge-signed { background:rgba(141,198,63,0.15); color:#8DC63F; }
    .badge-pending,.badge-awaiting { background:rgba(255,170,0,0.12); color:#ffaa00; }
    .badge-draft { background:rgba(255,255,255,0.06); color:#888; }
    .badge-overdue { background:rgba(239,68,68,0.12); color:#ef4444; }
    .badge-sent { background:rgba(74,158,255,0.12); color:#4a9eff; }
    .btn-lime { background:#8DC63F; color:#1A1A1A; border:none; border-radius:100px; padding:10px 20px; font-size:0.75rem; font-weight:700; cursor:pointer; text-decoration:none; display:inline-block; }
    .btn-ghost { background:rgba(255,255,255,0.07); color:#F3EDE3; border:1px solid rgba(255,255,255,0.12); border-radius:100px; padding:10px 20px; font-size:0.75rem; font-weight:700; text-decoration:none; display:inline-block; }
    .btn-blue { background:#4a9eff; color:white; border:none; border-radius:100px; padding:10px 20px; font-size:0.75rem; font-weight:700; text-decoration:none; display:inline-block; }
    .notes-ta { width:100%; background:transparent; border:none; outline:none; color:#F3EDE3; font-family:sans-serif; font-size:0.82rem; line-height:1.6; resize:vertical; min-height:80px; }
    .notes-ta::placeholder { color:#555; }
    .cta-card { background:rgba(141,198,63,0.06); border:1px solid rgba(141,198,63,0.2); border-radius:12px; padding:20px; display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap; margin-top:20px; }
    /* ADMIN */
    .admin-header-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .admin-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:16px; }
    @media(max-width:500px){ .admin-stats { grid-template-columns:repeat(2,1fr); } }
    .admin-stat-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:14px 12px; cursor:pointer; transition:border-color 0.2s; text-align:center; }
    .admin-stat-card:hover, .admin-stat-card.active { border-color:#8DC63F; background:rgba(141,198,63,0.06); }
    .admin-stat-val { font-size:1.4rem; font-weight:700; margin-bottom:4px; }
    .admin-stat-label { font-size:0.62rem; color:#666; text-transform:uppercase; letter-spacing:0.06em; }
    .admin-toolbar { display:flex; flex-direction:column; gap:10px; margin-bottom:12px; }
    .admin-search { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:12px 14px; color:#F3EDE3; font-size:0.85rem; font-family:sans-serif; outline:none; }
    .admin-search:focus { border-color:#8DC63F; }
    .admin-filters { display:flex; gap:6px; flex-wrap:wrap; }
    .filter-btn { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:100px; padding:6px 14px; font-size:0.72rem; color:#aaa; cursor:pointer; transition:all 0.15s; }
    .filter-btn:hover { border-color:#8DC63F; color:#8DC63F; }
    .filter-btn.active { background:rgba(141,198,63,0.12); border-color:#8DC63F; color:#8DC63F; font-weight:600; }
    .admin-actions-bar { display:flex; gap:8px; margin-bottom:16px; }
    .admin-action-btn { background:#8DC63F; color:#1A1A1A; border:none; border-radius:100px; padding:10px 18px; font-size:0.75rem; font-weight:700; cursor:pointer; }
    .admin-action-btn.ghost { background:rgba(255,255,255,0.06); color:#F3EDE3; border:1px solid rgba(255,255,255,0.1); }
    .lead-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:16px; margin-bottom:10px; transition:border-color 0.2s; }
    .lead-card:hover { border-color:rgba(255,255,255,0.15); }
    .lead-card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
    .lead-name { font-weight:700; font-size:0.92rem; margin-bottom:4px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .lead-meta { font-size:0.72rem; color:#666; margin-bottom:2px; }
    .lead-addr { font-size:0.72rem; color:#555; }
    .step-pill { font-size:0.62rem; font-weight:600; padding:3px 8px; border-radius:100px; }
    .mini-badge { font-size:0.6rem; font-weight:600; padding:2px 8px; border-radius:100px; margin-right:4px; }
    .lead-card-actions { display:flex; gap:6px; align-items:flex-start; flex-shrink:0; }
    .lead-btn { border:none; border-radius:100px; padding:8px 14px; font-size:0.72rem; font-weight:700; cursor:pointer; text-decoration:none; }
    .lead-btn.lime { background:#8DC63F; color:#1A1A1A; }
    .lead-btn.ghost { background:rgba(255,255,255,0.07); color:#F3EDE3; border:1px solid rgba(255,255,255,0.1); }
    .lead-progress { display:flex; align-items:center; }
    .prog-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.1); }
    .prog-dot.filled { background:#8DC63F; }
    .prog-line { flex:1; height:2px; background:rgba(255,255,255,0.08); }
    .prog-line.filled { background:#8DC63F; }
    .editor-panel { background:rgba(141,198,63,0.04); border:1px solid rgba(141,198,63,0.2); border-radius:14px; padding:22px; margin-bottom:16px; }
    .editor-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
    .editor-section-title { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:#555; margin:16px 0 10px; border-top:1px solid rgba(255,255,255,0.06); padding-top:14px; }
    .ed-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:520px){ .ed-grid { grid-template-columns:1fr; } }
    .ed-full { margin-bottom:12px; }
    .ed-label { font-size:0.64rem; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:#666; display:block; margin-bottom:5px; }
    .ed-input { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px 12px; color:#F3EDE3; font-size:0.82rem; font-family:sans-serif; outline:none; box-sizing:border-box; }
    .ed-input:focus { border-color:#8DC63F; }
    .editor-footer { display:flex; align-items:center; gap:10px; margin-top:18px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.06); flex-wrap:wrap; }
    .cust-edit-input { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:10px 12px; color:#F3EDE3; font-size:0.82rem; font-family:sans-serif; outline:none; box-sizing:border-box; }
    .cust-edit-input:focus { border-color:#8DC63F; }
    .type-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:100px; padding:9px 18px; font-size:0.75rem; font-weight:600; color:#888; cursor:pointer; transition:all 0.15s; }
    .type-btn.active { background:rgba(141,198,63,0.12); border-color:#8DC63F; color:#8DC63F; }
    .type-btn:hover { border-color:#8DC63F; color:#8DC63F; }
    .solar-stat-box { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:10px 6px; text-align:center; }
    .ssv { font-size:1rem; font-weight:700; color:#8DC63F; margin-bottom:3px; }
    .ssl { font-size:0.6rem; color:#666; text-transform:uppercase; letter-spacing:0.06em; }
    .nl-check-label { display:flex; align-items:center; gap:10px; font-size:0.82rem; cursor:pointer; padding:8px 12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:8px; }
    .nl-check { width:16px; height:16px; accent-color:#8DC63F; cursor:pointer; flex-shrink:0; }
    .nl-check-label:has(.nl-check:checked) { background:rgba(141,198,63,0.08); border-color:rgba(141,198,63,0.3); color:#8DC63F; }
    /* PORTAL TAB NAV */
    .portal-tab-nav { display:flex; gap:8px; padding:12px 16px 0; border-bottom:1px solid #2a2a2a; margin-bottom:16px; }
    .portal-tab { background:none; border:none; padding:8px 16px; font-size:0.78rem; font-weight:600; color:#666; cursor:pointer; border-bottom:2px solid transparent; border-radius:0; transition:all 0.2s; }
    .portal-tab.active { color:#8DC63F; border-bottom-color:#8DC63F; }
    .portal-tab:hover { color:#ccc; }
    /* JOBS LIST */
    .jobs-empty { padding:40px; text-align:center; color:#555; font-size:0.85rem; }
    .job-card { background:#1e1e1e; border:1px solid #2a2a2a; border-radius:10px; padding:16px; margin-bottom:10px; cursor:pointer; transition:border-color 0.2s; }
    .job-card:hover { border-color:#8DC63F44; }
    .job-card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .job-name { font-size:0.95rem; font-weight:700; color:#eee; }
    .job-status-pill { font-size:0.68rem; font-weight:600; padding:3px 10px; border-radius:100px; }
    .job-addr { font-size:0.78rem; color:#888; margin-bottom:4px; }
    .job-meta { font-size:0.72rem; color:#555; }
    /* JOB DETAIL */
    .job-back-btn { background:none; border:none; color:#8DC63F; font-size:0.82rem; font-weight:600; cursor:pointer; padding:8px 0 12px; display:flex; align-items:center; gap:6px; }
    .job-detail-card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; overflow:hidden; }
    .job-detail-header { display:flex; justify-content:space-between; align-items:flex-start; padding:16px; border-bottom:1px solid #2a2a2a; }
    .job-detail-name { font-size:1.05rem; font-weight:700; color:#eee; margin-bottom:4px; }
    .job-detail-addr { font-size:0.78rem; color:#888; }
    .job-status-select { background:#252525; border:1px solid #333; color:#ccc; padding:6px 10px; border-radius:8px; font-size:0.75rem; cursor:pointer; }
    .job-section { padding:16px; border-bottom:1px solid #222; }
    .job-section:last-child { border-bottom:none; }
    .job-section-title { font-size:0.78rem; font-weight:700; color:#8DC63F; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:12px; }
    .job-upload-area { border:2px dashed #333; border-radius:10px; padding:24px; text-align:center; transition:border-color 0.2s; margin-bottom:12px; }
    .job-upload-area:hover { border-color:#8DC63F66; }
    .job-upload-icon { font-size:2rem; margin-bottom:8px; }
    .job-upload-label { font-size:0.85rem; color:#aaa; font-weight:600; margin-bottom:4px; }
    .job-upload-sub { font-size:0.72rem; color:#555; margin-bottom:10px; }
    .job-upload-btn { background:#8DC63F; color:#1A1A1A; padding:8px 18px; border-radius:100px; font-size:0.75rem; font-weight:700; cursor:pointer; display:inline-block; }
    .job-upload-status { font-size:0.78rem; margin-top:8px; min-height:20px; }
    .photo-grid { margin-top:8px; }
    .photo-group { margin-bottom:16px; }
    .photo-group-label { font-size:0.72rem; font-weight:700; color:#aaa; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }
    .photo-group-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:8px; }
    .photo-thumb-wrap { border-radius:8px; overflow:hidden; aspect-ratio:1; background:#222; }
    .photo-thumb { width:100%; height:100%; object-fit:cover; cursor:pointer; transition:opacity 0.2s; }
    .photo-thumb:hover { opacity:0.8; }
    .job-field-row { display:flex; gap:8px; margin-bottom:8px; }
    .job-input { flex:1; background:#252525; border:1px solid #333; color:#ccc; padding:8px 12px; border-radius:8px; font-size:0.8rem; }
    .job-save-btn { background:#8DC63F; color:#1A1A1A; border:none; padding:8px 14px; border-radius:8px; font-size:0.75rem; font-weight:700; cursor:pointer; white-space:nowrap; }
    .job-doc-link { font-size:0.78rem; color:#4a9eff; text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
    .upgrade-empty { font-size:0.78rem; color:#555; padding:8px 0; }
    .upgrade-item-row { display:grid; grid-template-columns:1fr 120px 32px; gap:8px; margin-bottom:8px; align-items:center; }
    .upgrade-desc,.upgrade-cost { background:#252525; border:1px solid #333; color:#ccc; padding:7px 10px; border-radius:8px; font-size:0.8rem; }
    .upgrade-remove-btn { background:#2a2a2a; border:1px solid #333; color:#888; border-radius:6px; cursor:pointer; font-size:0.85rem; width:32px; height:32px; }
    .upgrade-remove-btn:hover { color:#ef4444; border-color:#ef4444; }
    .job-add-item-btn { background:#252525; border:1px solid #333; color:#8DC63F; padding:7px 14px; border-radius:8px; font-size:0.78rem; font-weight:600; cursor:pointer; margin-top:4px; }
    .upgrade-total-row { display:flex; justify-content:space-between; align-items:center; margin-top:14px; padding-top:12px; border-top:1px solid #2a2a2a; font-size:0.82rem; color:#aaa; font-weight:600; }
    .upgrade-total-val { font-size:1.1rem; font-weight:700; color:#8DC63F; }
    .job-notes-ta { width:100%; background:#252525; border:1px solid #333; color:#ccc; padding:10px; border-radius:8px; font-size:0.82rem; line-height:1.6; min-height:80px; resize:vertical; margin-bottom:10px; box-sizing:border-box; }

    /* ── PHOTO GRID ENHANCED ────────────────────────────── */
    .photo-summary-bar { font-size:0.75rem; color:#8DC63F; font-weight:600; margin-bottom:14px; padding:8px 12px; background:rgba(141,198,63,0.08); border-radius:8px; border:1px solid rgba(141,198,63,0.2); }
    .photo-empty-state { font-size:0.82rem; color:#555; padding:20px; text-align:center; border:2px dashed #2a2a2a; border-radius:10px; margin-top:8px; }
    .photo-group { margin-bottom:20px; }
    .photo-group-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid #222; }
    .photo-group-label { font-size:0.78rem; font-weight:700; color:#ccc; }
    .photo-group-count { font-size:0.68rem; color:#555; }
    .photo-group-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; }
    .photo-card { display:flex; flex-direction:column; gap:6px; }
    .photo-img-wrap { position:relative; aspect-ratio:1; background:#1e1e1e; border-radius:10px; overflow:hidden; border:1px solid #2a2a2a; }
    .photo-thumb { width:100%; height:100%; object-fit:cover; cursor:pointer; transition:opacity 0.2s; display:block; }
    .photo-thumb:hover { opacity:0.85; }
    .photo-card-label { font-size:0.65rem; color:#aaa; text-align:center; line-height:1.3; padding:0 2px; font-weight:500; }
    .photo-delete-btn { position:absolute; top:5px; right:5px; background:rgba(0,0,0,0.75); border:none; color:#fff; border-radius:50%; width:22px; height:22px; font-size:0.65rem; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.15s; padding:0; z-index:2; }

    .photo-delete-btn:hover { background:#ef4444; }
    .photo-expand-btn { position:absolute; bottom:5px; right:5px; background:rgba(0,0,0,0.65); border:none; color:#fff; border-radius:6px; width:22px; height:22px; font-size:0.75rem; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.15s; z-index:2; }
    .photo-img-wrap:hover .photo-expand-btn { opacity:1; }
    .photo-load-err { display:flex; align-items:center; justify-content:center; height:100%; font-size:0.7rem; color:#ef4444; }

    /* ── SUBSECTION TITLES ──────────────────────────────── */
    .job-subsection-title { font-size:0.72rem; font-weight:600; color:#aaa; margin-bottom:8px; display:flex; align-items:center; gap:6px; }

    /* ── ASSESSMENT UPLOAD ──────────────────────────────── */
    .assessment-sub { padding-top:4px; }

  function showErr(msg) { var e = document.getElementById('errMsg'); e.textContent = msg; e.style.display = 'block'; }
  function showDash(name, content) {
    document.getElementById('loginBox').style.display = 'none';

  function signOut() { sessionStorage.clear(); location.reload(); }

  async function handleLogin() {
    var btn = document.getElementById('loginBtn');
    var email = document.getElementById('emailInput').value.trim().toLowerCase();
    var code  = document.getElementById('codeInput').value.trim();
    document.getElementById('errMsg').style.display = 'none';
    if (!email) { showErr('Please enter your email address.'); return; }
    if (!code)  { showErr('Please enter your access code.'); return; }
    btn.textContent = 'Signing in...'; btn.disabled = true;

    // ── Admin check (always hardcoded) ───────────────────────────────────────
    if ((email === ADMIN_EMAIL) || (code === ADMIN_CODE)) {
      if (code === ADMIN_CODE) {
        sessionStorage.setItem('user', JSON.stringify({isAdmin:true, name:'Admin', role:'admin'}));
        loadAdminDashboard(); return;
      } else { showErr('Admin code incorrect.'); btn.textContent = 'Access My Portal'; btn.disabled = false; return; }
    }

    // ── Team member lookup — DB first, hardcoded arrays as fallback ──────────
    var teamMember = null;
    try {
      var tmC = supabase.createClient(SUPA_URL, SUPA_KEY);
      var tmR = await tmC.from('team_members').select('*').eq('email', email).eq('active', true).maybeSingle();
      teamMember = tmR.data || null;
    } catch(e) { console.warn('team_members lookup failed, using fallback:', e); }

    if (!teamMember) {
      var _r=SALES_REPS.find(function(x){return x.email===email;}),
          _t=TECHS.find(function(x){return x.email===email;}),
          _s=SETTERS.find(function(x){return x.email===email;}),
          _o=OPS_PARTNERS.find(function(x){return x.email===email;});
      if (_r)      teamMember=Object.assign({},_r,{role:'rep'});
      else if (_t) teamMember=Object.assign({},_t,{role:'tech'});
      else if (_s) teamMember=Object.assign({},_s,{role:'setter'});
      else if (_o) teamMember=Object.assign({},_o,{role:'ops'});
    }

    if (teamMember) {
      // Verify code (with portal_credentials override)
      var mCode = teamMember.code;
      try {
        var mcC=supabase.createClient(SUPA_URL,SUPA_KEY);
        var mcR=await mcC.from('portal_credentials').select('code').eq('rep_id',teamMember.id).maybeSingle();
        if (mcR.data&&mcR.data.code) mCode=mcR.data.code;
      } catch(e) {}
      if (code !== mCode) { showErr('Access code incorrect.'); btn.textContent='Access My Portal'; btn.disabled=false; return; }
      var tm=teamMember;
      if (tm.role==='rep')    { sessionStorage.setItem('user',JSON.stringify({isRep:true,name:tm.name,id:tm.id,role:'rep'})); loadRepDashboard(tm); return; }
      if (tm.role==='tech')   { sessionStorage.setItem('user',JSON.stringify({isTech:true,name:tm.name,id:tm.id,role:'tech'})); try{await loadTechDashboard(tm);}catch(e){showErr('Error: '+e.message);btn.textContent='Access My Portal';btn.disabled=false;} return; }
      if (tm.role==='setter') { sessionStorage.setItem('user',JSON.stringify({isSetter:true,name:tm.name,id:tm.id,role:'setter'})); loadSetterDashboard(tm); return; }
      if (tm.role==='ops')    { sessionStorage.setItem('user',JSON.stringify({isOps:true,name:tm.name,id:tm.id,role:'ops'})); try{await loadOpsDashboard(tm);}catch(e){showErr('Error: '+e.message);btn.textContent='Access My Portal';btn.disabled=false;} return; }
    }

    // Customer login — Supabase lookup with timeout guard
    if (typeof supabase === 'undefined') { showErr('Connection error — please refresh the page and try again.'); btn.textContent = 'Access My Portal'; btn.disabled = false; return; }
    var client;
    try { client = supabase.createClient(SUPA_URL, SUPA_KEY); }
    catch(e) { showErr('Connection error. Please refresh.'); btn.textContent = 'Access My Portal'; btn.disabled = false; return; }
    try {
      // Use .limit(1) instead of .single() so duplicate records don't break login
      var queryPromise = client.from('customers').select('*').eq('email', email).limit(1);
      var timeoutPromise = new Promise(function(_, reject){
        setTimeout(function(){ reject(new Error('Request timed out. Check your connection and try again.')); }, 12000);
      });
      var resp = await Promise.race([queryPromise, timeoutPromise]);
      if (resp.error || !resp.data || !resp.data.length) { showErr('No account found for this email. Double-check your address or call us at (619) 777-6527.'); btn.textContent = 'Access My Portal'; btn.disabled = false; return; }
      var c = resp.data[0];
      function normalize(p) {
        var d = (p||'').replace(/[^0-9]/g,'');
        if (d.length===11 && d.charAt(0)==='1') d = d.slice(1);
        if (d.length>11) d = d.slice(-10);
        return d;
      }
      var match = (normalize(code).length>=10 && normalize(code)===normalize(c.phone))
               || (normalize(code).length>=10 && normalize(code)===normalize(c.access_code))
               || code===c.access_code || code===c.phone;
      if (!match) { showErr('Access code incorrect.'); btn.textContent = 'Access My Portal'; btn.disabled = false; return; }
      sessionStorage.setItem('user', JSON.stringify(c));
      loadCustomerDashboard(c);
    } catch(e) { showErr('Error: '+e.message); btn.textContent = 'Access My Portal'; btn.disabled = false; }
  }

  // ── ADMIN ──────────────────────────────────────────────────────────────────

    var client;
    try { client = supabase.createClient(SUPA_URL, SUPA_KEY); }
    catch(e) { document.getElementById('dashBody').innerHTML = '<p style="color:#ef4444;">Database unavailable. <button onclick="loadAdminDashboard()" style="width:auto;padding:8px 16px;font-size:0.75rem;background:#8DC63F;color:#1A1A1A;border:none;border-radius:100px;cursor:pointer;">Retry</button></p>'; return; }
    var resp = await client.from('customers').select('*').order('created_at', {ascending:false});
    adminCustomers = resp.data || [];
    try { var agResp = await client.from('rep_agreements').select('*').order('signed_at',{ascending:false}); adminRecentAgreements = agResp.data || []; } catch(e) { adminRecentAgreements = []; }
    try { var tmResp = await client.from('team_members').select('*').order('created_at',{ascending:true}); adminTeamMembers = tmResp.data || []; } catch(e) { adminTeamMembers = []; }
    try { var mktResp = await client.from('marketing_expenses').select('*').order('expense_date',{ascending:false}); adminMarketingExpenses = mktResp.data || []; } catch(e) { adminMarketingExpenses = []; }
    renderAdminView('dashboard');
  }

  function renderAdminView(view) {
    adminView = view;
    // All unsold leads, split by category
    var allLeads = adminCustomers.filter(function(x){ return !x.sold_type; });
    var fixmyLeads = allLeads.filter(function(x){ return x.lead_category !== 'new_solar'; });
    var nsLeads    = allLeads.filter(function(x){ return x.lead_category === 'new_solar'; });

    // Active category filtered set
    var c = adminLeadCat === 'new_solar' ? nsLeads.slice() : fixmyLeads.slice();
    if (adminSearch) { var q = adminSearch.toLowerCase(); c = c.filter(function(x){ return ((x.first_name||'')+(x.last_name||'')+(x.email||'')+(x.phone||'')+(x.address||'')).toLowerCase().includes(q); }); }
    if (adminTechFilter) c = c.filter(function(x){ return (x.rep_id||'')===adminTechFilter; });
    if (adminOpsFilter)  c = c.filter(function(x){ return (x.assigned_ops||'')===adminOpsFilter; });
    if (adminFilter !== 'all') {
      c = c.filter(function(x){
        if (adminLeadCat === 'new_solar') {
          if (adminFilter==='new') return !x.solar_status || x.solar_status==='ns_eval_booked';
          if (adminFilter==='active') return x.solar_status && x.solar_status!=='ns_eval_booked' && x.solar_status!=='ns_eval_canceled';
          if (adminFilter==='complete') return x.solar_status==='ns_pto';
          return true;
        }
        if (adminFilter==='new') return !x.step||x.step<=1;
        if (adminFilter==='active') return x.step>=2&&x.step<=7;

  async function renderTeamView() {
    adminView = 'team';
    var portalNav = '<div class="portal-tab-nav"><button class="portal-tab" onclick="renderAdminView(\'dashboard\')">&#128221; Leads</button><button class="portal-tab" onclick="renderJobsView()">&#128295; Jobs</button><button class="portal-tab active" onclick="renderTeamView()">&#128101; Team</button><button class="portal-tab" onclick="renderScheduleView()">&#128197; Schedule</button><button class="portal-tab" onclick="renderMarketingView()">&#128200; Marketing</button><a class="portal-tab" href="/business-model.html?t=fixmybp26" target="_blank" style="text-decoration:none;">&#128203; Business Model</a></div>';
    document.getElementById('dashBody').innerHTML = portalNav + '<p style="color:#aaa;padding:20px 0;">Loading team data...</p>';

    // Fetch agreement records and credential overrides from Supabase
    var agreements = [], credOverrides = [], teamFetchError = '';
    try {
      var tc = supabase.createClient(SUPA_URL, SUPA_KEY);
      var ar = await tc.from('rep_agreements').select('*').order('signed_at', {ascending:false});
      if (ar.error) throw new Error('rep_agreements: ' + ar.error.message);
      agreements = ar.data || [];
      var cr = await tc.from('portal_credentials').select('*');
      if (cr.error) throw new Error('portal_credentials: ' + cr.error.message);
      credOverrides = cr.data || [];
    } catch(e) { teamFetchError = e.message; }

    function agStatus(repId) {
      var rec = agreements.find(function(a){ return a.rep_id === repId; });
      if (!rec) return '<span style="color:#ef4444;font-size:0.72rem;">&#10007; Not signed</span>';
      var d = rec.signed_at ? new Date(rec.signed_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
      var src = rec.source === 'admin' ? ' (admin confirmed)' : '';
      return '<span style="color:#8DC63F;font-size:0.72rem;">&#10003; Signed '+d+(rec.rep_legal_name?' &middot; '+rec.rep_legal_name:'')+src+'</span>';
    }

    function effectiveCode(repId, fallback) {
      var ov = credOverrides.find(function(c){ return c.rep_id === repId; });
      return ov && ov.code ? ov.code : fallback;
    }

    function userCard(u, role, needsAgreement) {

            '<button onclick="adminSaveAgreementUrl(\''+u.id+'\',document.getElementById(\''+urlInputId+'\').value)" style="padding:4px 10px;font-size:0.7rem;font-weight:700;background:rgba(74,158,255,0.12);border:1px solid rgba(74,158,255,0.3);color:#4a9eff;border-radius:6px;cursor:pointer;white-space:nowrap;">Save Link</button>'+

      ) : '<div style="font-size:0.7rem;color:#555;margin-top:4px;">No agreement required</div>';
      var editId = 'edit_' + (u.id || '').replace(/[^a-z0-9]/gi,'_');
      var isDbMember = adminTeamMembers.some(function(m){ return m.id===u.id; });
      return '<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px;margin-bottom:8px;">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;">'+
          '<div style="flex:1;">'+
            '<div style="font-size:0.9rem;font-weight:700;">'+u.name+'</div>'+
            '<div style="font-size:0.72rem;color:#888;margin-top:2px;">'+u.email+'</div>'+

    window.adminSaveAgreementUrl = async function(repId, url) {
      if (!url || !url.trim()) { alert('Paste a URL first.'); return; }
      try {
        var tcU = supabase.createClient(SUPA_URL, SUPA_KEY);
        var {error: uErr} = await tcU.from('rep_agreements').update({agreement_url: url.trim()}).eq('rep_id', repId);

        renderTeamView();
      } catch(e) { alert('Save failed: ' + e.message); }
    };

    window.adminSaveCode = async function(repId, newCode) {
      if (!newCode || !newCode.trim()) { alert('Enter a new code first.'); return; }
      try {
        var tc3 = supabase.createClient(SUPA_URL, SUPA_KEY);
        // Update both team_members and portal_credentials for compatibility
        await tc3.from('team_members').update({code:newCode.trim()}).eq('id',repId);
        await tc3.from('portal_credentials').upsert({rep_id:repId, code:newCode.trim()}, {onConflict:'rep_id'});
        var idx = adminTeamMembers.findIndex(function(m){return m.id===repId;});
        if (idx>-1) adminTeamMembers[idx].code=newCode.trim();
        alert('Code updated. Takes effect on next login.');
        renderTeamView();
      } catch(e) { alert('Error saving: ' + e.message); }
    };

    window.adminToggleMember = async function(memberId, activate) {
      var member = adminTeamMembers.find(function(m){return m.id===memberId;});
      if (!member) return;
      var action = activate ? 'Reactivate' : 'Deactivate';
      if (!confirm(action+' '+member.name+'? '+(activate?'They will be able to log in again.':'They will no longer be able to log in.'))) return;
      try {
        var tgC = supabase.createClient(SUPA_URL, SUPA_KEY);
        var {error: tgE} = await tgC.from('team_members').update({active:activate}).eq('id', memberId);
        if (tgE) throw new Error(tgE.message);
        var idx = adminTeamMembers.findIndex(function(m){return m.id===memberId;});
        if (idx>-1) adminTeamMembers[idx].active = activate;
        renderTeamView();
      } catch(e) { alert(action+' failed: '+e.message); }
    };

  // ── SCHEDULE CALENDAR HELPERS ────────────────────────────────────────────────
  function schedLocalKey(dt) {
    return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
  }
  function schedWeekStart(offset) {
    var d=new Date(); d.setHours(0,0,0,0);
    var dow=d.getDay(); d.setDate(d.getDate()-(dow===0?6:dow-1)+offset*7); return d;
  }
  function schedMonthStart(offset) {
    var d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+offset); d.setHours(0,0,0,0); return d;
  }
  var SCHED_TYPE_CLR  = {'Diagnostic Eval':'#8DC63F','Evaluation':'#4a9eff','Welcome Call':'#9b6de8','Install':'#f97316','NS Install':'#4a9eff'};
  var SCHED_MONTHS    = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var SCHED_DAY_SHORT = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  var SCHED_DAY_MED   = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  function buildSchedCalHtml(appts, refreshCmd) {
    var today=new Date(); today.setHours(0,0,0,0);
    var todayKey=schedLocalKey(today);
    var dayMap={};
    appts.forEach(function(a){
      var k=schedLocalKey(a.date);
      if (!dayMap[k]) dayMap[k]=[];
      dayMap[k].push(a);
    });
    var btnBase='padding:5px 14px;border:none;border-radius:100px;font-size:0.72rem;font-weight:700;cursor:pointer;';
    var navBtn='padding:5px 12px;border:none;border-radius:8px;font-size:0.82rem;cursor:pointer;background:rgba(255,255,255,0.07);color:#888;';
    var html='';
    // Toolbar
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">';
    html+='<div style="display:flex;gap:4px;">';
    html+='<button onclick="schedCalView=\'week\';schedCalOffset=0;'+refreshCmd+'" style="'+btnBase+'background:'+(schedCalView==='week'?'#8DC63F':'rgba(255,255,255,0.07)')+';color:'+(schedCalView==='week'?'#1A1A1A':'#888')+';">Week</button>';
    html+='<button onclick="schedCalView=\'month\';schedCalOffset=0;'+refreshCmd+'" style="'+btnBase+'background:'+(schedCalView==='month'?'#8DC63F':'rgba(255,255,255,0.07)')+';color:'+(schedCalView==='month'?'#1A1A1A':'#888')+';">Month</button>';
    html+='</div>';
    var periodLabel;
    if (schedCalView==='week') {
      var ws=schedWeekStart(schedCalOffset);
      var we=new Date(ws.getTime()+6*86400000);
      periodLabel=ws.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+we.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    } else {
      var ms=schedMonthStart(schedCalOffset);
      periodLabel=SCHED_MONTHS[ms.getMonth()]+' '+ms.getFullYear();
    }
    html+='<div style="display:flex;align-items:center;gap:8px;">';
    html+='<button onclick="schedCalOffset--;'+refreshCmd+'" style="'+navBtn+'">&#8592;</button>';
    html+='<span style="font-size:0.75rem;font-weight:700;color:#ccc;white-space:nowrap;">'+periodLabel+'</span>';
    html+='<button onclick="schedCalOffset++;'+refreshCmd+'" style="'+navBtn+'">&#8594;</button>';
    html+='</div></div>';
    // Grid container
    html+='<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:12px;overflow:hidden;margin-bottom:20px;">';
    if (schedCalView==='week') {
      var ws2=schedWeekStart(schedCalOffset);
      // Header row
      html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.07);">';
      for (var di=0;di<7;di++) html+='<div style="padding:6px 2px;text-align:center;font-size:0.62rem;font-weight:700;color:#555;letter-spacing:0.04em;">'+SCHED_DAY_MED[di]+'</div>';
      html+='</div>';
      // Day cells
      html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);">';
      for (var di=0;di<7;di++) {
        var cellD=new Date(ws2.getTime()+di*86400000);
        var cellK=schedLocalKey(cellD);
        var isTd=cellK===todayKey;
        var isPast=cellD<today;
        var cA=dayMap[cellK]||[];
        var isWknd=di>=5;
        html+='<div style="min-height:82px;padding:5px 3px;border-right:1px solid rgba(255,255,255,0.05);'+(isWknd?'background:rgba(0,0,0,0.1);':'')+'">';
        html+='<div style="text-align:center;margin-bottom:4px;">';
        if (isTd) html+='<span style="background:#8DC63F;color:#1A1A1A;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:900;">'+cellD.getDate()+'</span>';
        else       html+='<span style="font-size:0.78rem;font-weight:'+(cA.length?700:400)+';color:'+(isPast?'#444':cA.length?'#ccc':'#555')+';">'+cellD.getDate()+'</span>';
        html+='</div>';
        var extra=cA.length>3?cA.length-3:0;
        cA.slice(0,3).forEach(function(a){
          var tc=SCHED_TYPE_CLR[a.type]||'#888';
          var ts=a.date.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
          var fn=(a.customer.first_name||'?');
          var df=(a.type==='Install'||a.type==='NS Install')?'install_date':'diagnostic_date';
          html+='<div onclick="quickReschedule(\''+a.customer.id+'\',\''+df+'\',\''+fn+' '+(a.customer.last_name||'')+'\',\''+(a.customer[df]||'')+'\',\''+(a.customer.arrival_end||'')+'\')" title="'+fn+' '+(a.customer.last_name||'')+'" style="cursor:pointer;font-size:0.58rem;padding:2px 3px;border-radius:3px;background:'+tc+'22;color:'+tc+';border-left:2px solid '+tc+';margin-bottom:2px;line-height:1.3;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">'+ts+' '+fn+'</div>';
        });
        if (extra) html+='<div style="font-size:0.58rem;color:#555;text-align:center;">+'+extra+' more</div>';
        html+='</div>';
      }
      html+='</div>';
    } else {
      var ms2=schedMonthStart(schedCalOffset);
      var mY=ms2.getFullYear(), mMo=ms2.getMonth();
      var lastDay2=new Date(mY,mMo+1,0).getDate();
      var startDow=ms2.getDay();
      var totalCells=Math.ceil((startDow+lastDay2)/7)*7;
      // Header
      html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.07);">';
      SCHED_DAY_SHORT.forEach(function(d){ html+='<div style="padding:6px 2px;text-align:center;font-size:0.62rem;font-weight:700;color:#555;letter-spacing:0.04em;">'+d+'</div>'; });
      html+='</div>';
      // Cells
      html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);">';
      for (var ci=0;ci<totalCells;ci++) {
        var dn=ci-startDow+1;
        var inM=(dn>=1&&dn<=lastDay2);
        var cd=new Date(mY,mMo,dn);
        var ck=schedLocalKey(cd);
        var isTd2=ck===todayKey;
        var isPast2=inM&&cd<today;
        var cA2=inM?(dayMap[ck]||[]):[];
        var isWknd2=(ci%7===0)||(ci%7===6);
        html+='<div style="min-height:56px;padding:3px;border-right:1px solid rgba(255,255,255,0.05);border-top:1px solid rgba(255,255,255,0.05);'+(!inM||isWknd2?'background:rgba(0,0,0,0.1);':'')+'">';
        if (inM) {
          html+='<div style="text-align:center;margin-bottom:2px;">';
          if (isTd2) html+='<span style="background:#8DC63F;color:#1A1A1A;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:900;">'+dn+'</span>';
          else        html+='<span style="font-size:0.7rem;font-weight:'+(cA2.length?700:400)+';color:'+(isPast2?'#444':cA2.length?'#ccc':'#555')+';">'+dn+'</span>';
          html+='</div>';
          var extra2=cA2.length>2?cA2.length-2:0;
          cA2.slice(0,2).forEach(function(a){
            var tc2=SCHED_TYPE_CLR[a.type]||'#888';
            var fn2=(a.customer.first_name||'?');
            var df2=(a.type==='Install'||a.type==='NS Install')?'install_date':'diagnostic_date';
            html+='<div onclick="quickReschedule(\''+a.customer.id+'\',\''+df2+'\',\''+fn2+' '+(a.customer.last_name||'')+'\',\''+(a.customer[df2]||'')+'\',\''+(a.customer.arrival_end||'')+'\')" title="'+fn2+'" style="cursor:pointer;font-size:0.58rem;padding:2px 3px;border-radius:3px;background:'+tc2+'22;color:'+tc2+';border-left:2px solid '+tc2+';margin-bottom:2px;line-height:1.3;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">'+fn2+'</div>';
          });
          if (extra2) html+='<div style="font-size:0.58rem;color:#555;text-align:center;">+'+extra2+'</div>';
        }
        html+='</div>';
      }
      html+='</div>';
    }
    html+='</div>';
    return html;
  }

      (showEnd

        : '<input type="hidden" id="qrEnd" value=""/>')+

      '<button onclick="document.getElementById(\'qrModal\').remove()" style="flex:1;padding:11px;background:rgba(255,255,255,0.07);color:#888;border:none;border-radius:10px;font-size:0.82rem;font-weight:700;cursor:pointer;">Cancel</button>'+
      '</div></div>';
    document.body.appendChild(modal);
  };

  window.saveReschedule = async function(id, dateField) {
    var dEl=document.getElementById('qrDate'), tEl=document.getElementById('qrTime'), eEl=document.getElementById('qrEnd');
    if (!dEl||!tEl) return;
    var dv=dEl.value, tv=tEl.value, ev=eEl?eEl.value:'';
    if (!dv) { alert('Please select a date.'); return; }
    var newISO=tv?new Date(dv+'T'+tv).toISOString():new Date(dv+'T09:00').toISOString();
    var updates={}; updates[dateField]=newISO;
    if (dateField==='diagnostic_date') updates.arrival_end=ev||null;
    try {
      var sc=supabase.createClient(SUPA_URL,SUPA_KEY);
      var {error}=await sc.from('customers').update(updates).eq('id',id);
      if (error) throw error;
      var idx=adminCustomers.findIndex(function(x){return x.id===id;});
      if (idx>-1) Object.assign(adminCustomers[idx],updates);
      var m=document.getElementById('qrModal'); if(m) m.remove();
      if (adminView==='schedule') renderScheduleView();
      else if (typeof window.salesRefresh==='function') window.salesRefresh();
    } catch(e) { alert('Save failed: '+e.message); }
  };

  // ── SCHEDULE TAB ─────────────────────────────────────────────────────────────
  function renderScheduleView() {
    adminView = 'schedule';
    var portalNav = '<div class="portal-tab-nav">'+
      '<button class="portal-tab" onclick="renderAdminView(\'dashboard\')">&#128221; Leads</button>'+
      '<button class="portal-tab" onclick="renderJobsView()">&#128295; Jobs</button>'+
      '<button class="portal-tab" onclick="renderTeamView()">&#128101; Team</button>'+
      '<button class="portal-tab active" onclick="renderScheduleView()">&#128197; Schedule</button>'+
      '<button class="portal-tab" onclick="renderMarketingView()">&#128200; Marketing</button>'+
      '<a class="portal-tab" href="/business-model.html?t=fixmybp26" target="_blank" style="text-decoration:none;">&#128203; Business Model</a>'+
    '</div>';

    var now = new Date();
    var past7 = new Date(now.getTime() - 7*24*60*60*1000);
    var future90 = new Date(now.getTime() + 90*24*60*60*1000);

    // Build appointment list from all customers
    var appts = [];
    adminCustomers.forEach(function(c) {
      if (c.diagnostic_date) {
        var dt = new Date(c.diagnostic_date);
        if (dt >= past7 && dt <= future90) {
          var t = c.lead_category === 'new_solar'
            ? ((c.solar_status==='ns_welcome_scheduled'||c.solar_status==='ns_welcome_rescheduled') ? 'Welcome Call' : 'Evaluation')
            : 'Diagnostic Eval';
          appts.push({customer:c, date:dt, type:t, endTime:c.arrival_end});
        }
      }
      if (c.install_date) {
        var dt2 = new Date(c.install_date);
        if (dt2 >= past7 && dt2 <= future90) {
          appts.push({customer:c, date:dt2, type:c.lead_category==='new_solar'?'NS Install':'Install', endTime:null});
        }
      }
    });
    appts.sort(function(a,b){ return a.date - b.date; });

    // Group by date for the list below the calendar
    var groups = {}, groupOrder = [];
    appts.forEach(function(a) {
      var key = schedLocalKey(a.date);
      if (!groups[key]) { groups[key]=[]; groupOrder.push(key); }
      groups[key].push(a);
    });

    // Build the list HTML
    var listHtml = '';
    if (!appts.length) {
      listHtml = '<div style="text-align:center;padding:40px;color:#555;">No appointments in range.<br/><span style="font-size:0.72rem;margin-top:8px;display:block;">Set a diagnostic or install date on a lead and it will appear here.</span></div>';
    } else {
      groupOrder.forEach(function(dk) {
        var dayDt = new Date(dk+'T12:00:00');
        var isToday = dk === schedLocalKey(new Date());
        var dayLabel = dayDt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
        listHtml += '<div style="margin-bottom:20px;">';
        listHtml += '<div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:'+(isToday?'#8DC63F':'#888')+';margin-bottom:8px;">'+(isToday?'&#128197; TODAY &mdash; ':'')+dayLabel+'</div>';
        groups[dk].forEach(function(a) {
          var c = a.customer;
          var timeStr = a.date.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
          if (a.endTime) timeStr += ' – ' + a.endTime;
          var isPast = a.date < now;
          var tc = SCHED_TYPE_CLR[a.type]||'#888';
          var bdr = isPast ? 'rgba(239,68,68,0.3)' : isToday ? 'rgba(141,198,63,0.3)' : 'rgba(255,255,255,0.1)';
          var df = (a.type==='Install'||a.type==='NS Install')?'install_date':'diagnostic_date';
          var name = (c.first_name||'')+' '+(c.last_name||'');
          listHtml += '<div style="background:rgba(255,255,255,0.04);border:1px solid '+bdr+';border-radius:12px;padding:14px;margin-bottom:8px;">';
          listHtml += '<div style="display:flex;justify-content:space-between;align-items:flex-start;">';
          listHtml += '<div style="flex:1;">';
          listHtml += '<div style="font-size:0.92rem;font-weight:700;">'+name+'</div>';
          listHtml += '<div style="font-size:0.75rem;color:#888;margin-top:2px;">'+timeStr+'</div>';
          listHtml += '<div style="font-size:0.72rem;color:#666;margin-top:2px;">'+(c.address||'No address')+'</div>';
          if (c.phone) listHtml += '<div style="font-size:0.7rem;color:#4a9eff;margin-top:2px;">'+c.phone+'</div>';
          listHtml += '</div>';
          listHtml += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">';
          listHtml += '<span style="font-size:0.65rem;font-weight:700;padding:3px 8px;border-radius:20px;background:'+tc+'22;color:'+tc+';border:1px solid '+tc+'44;">'+a.type+'</span>';
          if (isPast) listHtml += '<span style="font-size:0.62rem;color:#ef4444;font-weight:700;">Past</span>';
          listHtml += '<button onclick="quickReschedule(\''+c.id+'\',\''+df+'\',\''+name+'\',\''+(c[df]||'')+'\',\''+(c.arrival_end||'')+'\')" style="font-size:0.68rem;padding:4px 10px;background:rgba(74,158,255,0.1);color:#4a9eff;border-radius:8px;border:1px solid rgba(74,158,255,0.25);cursor:pointer;font-weight:700;">&#128197; Reschedule</button>';
          listHtml += '<button onclick="openLeadEditor(\''+c.id+'\')" style="font-size:0.68rem;padding:4px 10px;background:rgba(255,255,255,0.06);color:#aaa;border-radius:8px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-weight:700;">&#9998; Full Edit</button>';
          if (c.phone) listHtml += '<a href="tel:'+c.phone.replace(/\D/g,'')+'" style="font-size:0.68rem;padding:4px 10px;background:rgba(141,198,63,0.1);color:#8DC63F;border-radius:8px;border:1px solid rgba(141,198,63,0.2);text-decoration:none;font-weight:700;">&#128222; Call</a>';
          listHtml += '</div></div>';
          if (c.notes) listHtml += '<div style="font-size:0.68rem;color:#555;margin-top:8px;border-top:1px solid rgba(255,255,255,0.06);padding-top:6px;">'+c.notes.substring(0,150)+(c.notes.length>150?'&hellip;':'')+'</div>';
          listHtml += '</div>';
        });
        listHtml += '</div>';
      });
    }

    document.getElementById('dashBody').innerHTML = portalNav+
      '<div class="admin-header-row"><h2 style="font-size:1.1rem;font-weight:700;">Schedule</h2>'+
      '<span style="font-size:0.72rem;color:#555;">'+appts.length+' appointment'+(appts.length!==1?'s':'')+' (next 90 days)</span></div>'+
      '<div id="editorSlot"></div>'+
      buildSchedCalHtml(appts,'renderScheduleView()')+
      '<div id="scheduleList">'+listHtml+'</div>';
  }

  function extractZip(address) {
    if (!address) return null;
    var m = address.match(/\b(\d{5})(?:-\d{4})?\b/g);
    return m ? m[m.length-1] : null;
  }

  function renderMarketingView() {
    adminView = 'marketing';
    var portalNav = '<div class="portal-tab-nav">'+

  async function saveMarketingExpense() {
    var id = document.getElementById('mktExpId').value;
    var dateVal = document.getElementById('mktDate').value;
    var amtVal  = parseFloat(document.getElementById('mktAmount').value)||0;
    if (!dateVal) { alert('Date is required.'); return; }
    if (!amtVal)  { alert('Amount is required.'); return; }
    var rawZips = (document.getElementById('mktZips').value||'').replace(/\s+/g,'').replace(/,+/g,',').replace(/^,|,$/g,'');
    var payload = {
      expense_date: dateVal,
      amount: amtVal,
      category: document.getElementById('mktCategory').value||null,
      description: document.getElementById('mktDesc').value||null,
      mailed_zips: rawZips||null
    };
    try {
      var sc = supabase.createClient(SUPA_URL, SUPA_KEY);
      if (id) {
        var {error: uErr} = await sc.from('marketing_expenses').update(payload).eq('id',id);
        if (uErr) throw uErr;
        var idx = adminMarketingExpenses.findIndex(function(x){ return x.id===id; });
        if (idx>-1) adminMarketingExpenses[idx] = Object.assign(adminMarketingExpenses[idx], payload);
      } else {
        var {data: ins, error: iErr} = await sc.from('marketing_expenses').insert(payload).select().single();
        if (iErr) throw iErr;
        adminMarketingExpenses.unshift(ins);
      }
      closeLeadEditor();
      renderMarketingView();
    } catch(e) { alert('Save failed: '+e.message); }
  }

  async function deleteMarketingExpense(id) {
    if (!confirm('Delete this expense entry? This cannot be undone.')) return;
    try {
      var sc = supabase.createClient(SUPA_URL, SUPA_KEY);
      var {error} = await sc.from('marketing_expenses').delete().eq('id',id);
      if (error) throw error;
      adminMarketingExpenses = adminMarketingExpenses.filter(function(x){ return x.id!==id; });
      renderMarketingView();
    } catch(e) { alert('Delete failed: '+e.message); }
  }

  function diagnoseBucketError(e, bucketName) {
    var code    = e.statusCode || e.status || e.error || '';
    var msg     = (e.message || '').toLowerCase();
    var rawMsg  = e.message || e.error || JSON.stringify(e);

    // Bucket name mismatch
    if (msg.includes('not found') || msg.includes('does not exist') || code === 404 || code === '404') {
      return {
        title: 'Bucket not found: "' + bucketName + '"',
        detail: 'The bucket name in the code does not match what exists in Supabase. ' +
                'Fix: Go to Supabase → Storage and confirm the exact bucket name (case-sensitive). ' +
                'Current code is looking for: <strong>' + bucketName + '</strong>'
      };
    }
    // Policy / RLS blocking
    if (msg.includes('policy') || msg.includes('violates') || msg.includes('unauthorized') || msg.includes('permission') || code === 403 || code === '403') {
      return {
        title: 'Permission denied — RLS policy missing or blocking upload',
        detail: 'Supabase is rejecting the upload because no INSERT policy exists for this bucket. ' +
                'Fix: Supabase → Storage → ' + bucketName + ' → Policies → New Policy → ' +
                'Operation: INSERT → Target: <strong>authenticated</strong> and <strong>anon</strong> → WITH CHECK: <code>bucket_id = \'' + bucketName + '\'</code>'
      };
    }
    // Auth / JWT issue
    if (msg.includes('jwt') || msg.includes('token') || msg.includes('auth') || code === 401 || code === '401') {
      return {
        title: 'Authentication error — invalid or expired session',
        detail: 'The Supabase API key or user session may be invalid. ' +
                'Fix: Check that SUPA_KEY in the portal matches your Supabase project\'s anon/public key under Settings → API.'
      };
    }
    // Row too large / file too big
    if (msg.includes('too large') || msg.includes('size') || code === 413 || code === '413') {
      return {
        title: 'File too large',
        detail: 'Supabase free tier allows up to 50MB per file. Reduce the image size or upgrade your Supabase plan.'
      };
    }
    // Network / CORS
    if (msg.includes('cors') || msg.includes('network') || msg.includes('failed to fetch')) {
      return {
        title: 'Network / CORS error',
        detail: 'The browser is blocking the request. Check that your Supabase project URL is correct and that the domain is allowed under Supabase → Auth → URL Configuration.'
      };
    }
    // Generic fallback
    return {
      title: 'Upload error: ' + rawMsg,
      detail: 'Raw error code: ' + code + '. Check the browser console (F12 → Console) for the full error object.'
    };
  }

  async function uploadPhotos(files) {
    if (!files.length || !currentJobId) return;
    var status = document.getElementById('photoStatus');
    if (!status) return;
    status.style.color = '#4a9eff';

    var BUCKET = 'job_photos';
    var client = supabase.createClient(SUPA_URL, SUPA_KEY);
    if (!jobPhotos[currentJobId]) jobPhotos[currentJobId] = [];
    var uploaded = 0;

    function showError(diag) {
      status.innerHTML =
        '<div style="color:#ef4444;font-size:0.82rem;line-height:1.6;">' +
        '<strong>&#9888; ' + diag.title + '</strong><br>' +
        '<span style="color:#aaa;font-size:0.74rem;">' + diag.detail + '</span>' +
        '</div>';
      console.error('[Photo Upload]', diag.title, diag.detail);
    }

    // Step 1 — test bucket access
    status.textContent = 'Checking storage access...';
    var testPath = 'jobs/' + String(currentJobId) + '/_test_' + Date.now() + '.txt';
    var testBlob = new Blob(['test'], { type: 'text/plain' });
    var testResult = await client.storage.from(BUCKET).upload(testPath, testBlob, { upsert: true });
    if (testResult.error) {
      showError(diagnoseBucketError(testResult.error, BUCKET));
      return;
    }
    await client.storage.from(BUCKET).remove([testPath]);

    // Step 2 — upload each file
    for (var i = 0; i < files.length; i++) {
      var file = files[i];
      status.textContent = 'Uploading ' + (i+1) + ' of ' + files.length + ' — ' + file.name;

      var safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      var path = 'jobs/' + String(currentJobId) + '/' + Date.now() + '_' + safeName;

      var uploadResult = await client.storage.from(BUCKET).upload(path, file, { upsert: true });
      if (uploadResult.error) {
        var diag = diagnoseBucketError(uploadResult.error, BUCKET);
        showError({ title: 'Photo ' + (i+1) + ' failed — ' + diag.title, detail: diag.detail });
        status.style.color = '#ef4444';
        continue;
      }

      var publicUrl = client.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;

      status.textContent = 'Quoya reviewing ' + (i+1) + ' of ' + files.length + '...';
      // Rate-limit: small delay between API calls when processing multiple photos
      if (i > 0) await new Promise(function(r){ setTimeout(r, 300); });
      var aiResult = await quoyaAutoAssess(file);

      // Show per-photo quality feedback in status before moving on
      if (aiResult.flag === 'needs_retake') {
        status.innerHTML = '⚠ Photo ' + (i+1) + ': <span style="color:#ffaa00;">' + (aiResult.note || 'Needs retake') + '</span> — labeled as <strong>' + aiResult.label + '</strong>';
      } else {
        status.textContent = '✓ Photo ' + (i+1) + ': ' + aiResult.label;
      }

      var photoRecord = {
        job_id: String(currentJobId),
        url: publicUrl,
        path: path,
        label: aiResult.label,
        quality_flag: aiResult.flag,
        quality_note: aiResult.note,
        uploaded_at: new Date().toISOString()
      };

      // Step 3 — save to DB
      var insertResult = await client.from('job_photos').insert(photoRecord).select();
      if (insertResult.error) {
        var ie = insertResult.error;
        var iMsg = (ie.message || '').toLowerCase();
        var iDetail = ie.message || JSON.stringify(ie);
        var iHint = ie.hint ? ' Hint: ' + ie.hint : '';
        var iCode = ie.code || '';
        var dbDiag = iCode === '42501' || iMsg.includes('policy')
          ? 'RLS policy is blocking INSERT on job_photos table. Fix: Supabase → Table Editor → job_photos → Policies → add INSERT policy for authenticated/anon.'
          : iCode === '23503'
          ? 'Foreign key error — the job_id ' + currentJobId + ' does not exist in the jobs table yet.'
          : iCode === '42P01'
          ? 'Table "job_photos" does not exist in Supabase. Check Table Editor.'
          : iDetail + iHint;
        status.innerHTML =
          '<div style="color:#ffaa00;font-size:0.82rem;line-height:1.6;">' +
          '<strong>&#9888; Photo uploaded but DB record failed</strong><br>' +
          '<span style="color:#aaa;font-size:0.74rem;">' + dbDiag + '</span>' +
          '</div>';
        console.warn('[DB Insert]', iDetail, ie);
        jobPhotos[currentJobId].push(photoRecord);
      } else {
        var savedRecord = (insertResult.data && insertResult.data[0]) ? insertResult.data[0] : photoRecord;
        jobPhotos[currentJobId].push(savedRecord);
        uploaded++;
      }
      renderPhotoGrid();
    }

    if (uploaded > 0) {
      var retakes = (jobPhotos[currentJobId] || []).filter(function(p){ return p.quality_flag === 'needs_retake'; }).length;
      if (retakes > 0) {
        status.innerHTML = '✓ ' + uploaded + ' uploaded — <span style="color:#ffaa00;">⚠ ' + retakes + ' photo' + (retakes!==1?'s':'') + ' need retaking (see flags above)</span>';
        status.style.color = '#8DC63F';
      } else {
        status.textContent = '✓ ' + uploaded + ' of ' + files.length + ' photo(s) uploaded — all clear';
        status.style.color = '#8DC63F';
      }
    } else if (!status.innerHTML.includes('&#9888;')) {
      status.textContent = 'All uploads failed — see error above';
      status.style.color = '#ef4444';
    }
  }

  // ── Solar photo categories ──────────────────────────────────────────────────
  var PHOTO_CATEGORIES = [
    'MSP Step Back Photo',
    'MSP Sticker Photo',
    'Panel Placard',
    'Battery Placement Wall Photo',
    'Sub Panel',
    'Sub Panel Sticker Photo',
    'Inverter Photo',
    'Solar Array',
    'Utility Bill',

  async function aiLabelPhoto(file) {
    try {
      var base64 = await new Promise(function(resolve) {
        var reader = new FileReader();
        reader.onload = function(e) { resolve(e.target.result.split(',')[1]); };
        reader.readAsDataURL(file);
      });

      var prompt = [
        'You are Quoya, a solar field assessment AI for Solar Review in Southern California.',
        'Examine this photo and classify it into EXACTLY ONE of these categories:',
        '',
        '- MSP Step Back Photo (wide shot of main service panel/breaker box from 3-4 feet showing full panel)',
        '- MSP Sticker Photo (close-up of sticker/label inside main panel showing amperage, voltage, manufacturer)',
        '- Panel Placard (service entrance placard, main disconnect label, or rating nameplate on panel exterior)',
        '- Battery Placement Wall Photo (wall or garage area where battery storage will be mounted)',
        '- Sub Panel (sub panel or secondary load center separate from main panel)',
        '- Sub Panel Sticker Photo (close-up of sub panel interior label showing breaker ratings)',
        '- Inverter Photo (solar inverter unit — Enphase, SolarEdge, SMA, Fronius, Generac, etc.)',
        '- Solar Array (solar panels on roof, ground mount, or in yard — any angle)',
        '- Utility Bill (photo of utility bill, SDG&E/SCE/LADWP statement, true-up notice)',
        '- Front of House (street view, exterior front of home, driveway, address visible)',
        '- Attic (attic space, rafters, roof sheathing, insulation, attic wiring)',
        '- Additional Photos (anything else — meter, garage interior, unknown)',
        '',
        'Rules:',
        '- Respond with ONLY the exact category name from the list above.',
        '- No punctuation, no explanation, no other words.',
        '- If unsure between MSP Step Back and MSP Sticker: step back = full panel visible, sticker = close-up of label.',
        '- If you are unsure, choose "Additional Photos".'
      ].join('\n');

      var response = await fetch('/.netlify/functions/claude-vision', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 20,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: file.type, data: base64 } },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });

      var result = await response.json();
      if (result.content && result.content[0] && result.content[0].text) {
        var raw = result.content[0].text.trim().replace(/[.!?,]/g, '');
        var match = PHOTO_CATEGORIES.find(function(cat) {
          return cat.toLowerCase() === raw.toLowerCase() ||
                 raw.toLowerCase().includes(cat.toLowerCase().split(' ')[0]);
        });
        return match || 'Additional Photos';
      }
      return 'Additional Photos';
    } catch(e) {
      console.warn('AI labeling failed:', e);
      return 'Additional Photos';
    }
  }

  // ── Quoya combined assessment: label + quality flag ─────────────────────────
  async function quoyaAssessPhoto(file, expectedCategory) {
    try {
      var base64 = await new Promise(function(resolve) {
        var reader = new FileReader();
        reader.onload = function(e) { resolve(e.target.result.split(',')[1]); };
        reader.readAsDataURL(file);
      });

      var prompt = [
        'You are Quoya, a solar field assessment AI for Solar Review in Southern California.',
        'Assess this photo and respond with ONLY a valid JSON object — no extra text.',
        '',
        'Expected category: ' + expectedCategory,
        '',
        'Categories: MSP Step Back Photo, MSP Sticker Photo, Panel Placard, Battery Placement Wall Photo, Sub Panel, Sub Panel Sticker Photo, Inverter Photo, Solar Array, Utility Bill, Front of House, Attic, Additional Photos',
        '',
        'Respond with this exact JSON structure:',
        '{',
        '  "label": "<exact category name from list>",',
        '  "flag": "<good|needs_retake|wrong_category>",',
        '  "note": "<one sentence reason if flag is not good, else empty string>"',
        '}',
        '',
        'flag = good: photo is clear, correctly categorized, required info visible',
        'flag = needs_retake: correct subject but blurry/dark/partial/too far/info not readable',
        'flag = wrong_category: subject does not match expected category',
        '',
        'Examples of needs_retake notes:',
        '- "Inverter model number not visible — move closer"',
        '- "MSP sticker not fully legible — open panel door and move closer"',
        '- "Panel amperage label not legible — open panel door fully"',
        '- "Battery wall area partially cut off — step back to show full mounting area"'
      ].join('\n');

      var response = await fetch('/.netlify/functions/claude-vision', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 120,
          messages: [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: file.type, data: base64 } },
            { type: 'text', text: prompt }
          ]}]
        })
      });

      var result = await response.json();
      if (result.content && result.content[0] && result.content[0].text) {
        try {
          var parsed = JSON.parse(result.content[0].text.trim());
          var validCats = PHOTO_CATEGORIES;
          var label = validCats.find(function(c){ return c.toLowerCase()===parsed.label.toLowerCase(); }) || expectedCategory;
          var flag  = ['good','needs_retake','wrong_category'].includes(parsed.flag) ? parsed.flag : 'good';
          return { label: label, flag: flag, note: parsed.note || '' };
        } catch(e) {
          return { label: expectedCategory, flag: 'good', note: '' };
        }
      }
      return { label: expectedCategory, flag: 'good', note: '' };
    } catch(e) {
      console.warn('Quoya assessment failed:', e);
      return { label: expectedCategory, flag: 'good', note: '' };
    }
  }

        '- Panel Placard: service entrance placard, main disconnect label, or rating nameplate on panel exterior',
        '- Battery Placement Wall Photo: wall or garage area designated for battery storage installation',
        '- Sub Panel: sub panel or secondary load center separate from main panel',
        '- Sub Panel Sticker Photo: close-up of sub panel interior label showing breaker ratings',
        '- Inverter Photo: solar inverter unit (Enphase, SolarEdge, SMA, Fronius, Generac, etc.)',
        '- Solar Array: solar panels on roof, ground mount, or in yard',

        '- Front of House: street view or exterior front of home',
        '- Attic: attic space, rafters, roof sheathing, insulation',
        '- Additional Photos: anything else not matching above categories',
        '',
        'Respond with this exact JSON structure:',

        '  "label": "<exact category name from list>",',
        '  "flag": "<good|needs_retake>",',
        '  "note": "<one sentence reason if needs_retake, else empty string>"',
        '}',
        '',
        'flag = good: photo is clear, subject identifiable, required info visible',
        'flag = needs_retake: blurry, too dark, too far away, partially cut off, or key info not readable',
        '',
        'Examples of needs_retake notes:',
        '- "Inverter model number not visible — move closer"',
        '- "MSP sticker text not legible — open panel door fully and move closer"',
        '- "Panel amperage label not readable — better lighting needed"',
        '- "Battery wall area cut off — step back to show full mounting surface"'
      ].join('\n');

      var response = await fetch('/.netlify/functions/claude-vision', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 120,
          messages: [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: file.type, data: base64 } },
            { type: 'text', text: prompt }
          ]}]
        })
      });

      var result = await response.json();
      if (result.content && result.content[0] && result.content[0].text) {
        try {
          var parsed = JSON.parse(result.content[0].text.trim());
          var label = PHOTO_CATEGORIES.find(function(c){ return c.toLowerCase() === (parsed.label||'').toLowerCase(); }) || 'Additional Photos';
          var flag  = parsed.flag === 'needs_retake' ? 'needs_retake' : 'good';
          return { label: label, flag: flag, note: parsed.note || '' };
        } catch(e) {
          return { label: 'Additional Photos', flag: 'good', note: '' };
        }
      }
      return { label: 'Additional Photos', flag: 'good', note: '' };
    } catch(e) {
      console.warn('Quoya auto-assess failed:', e);
      return { label: 'Additional Photos', flag: 'good', note: '' };
    }
  }

  // Load photos — tries DB first, falls back to scanning Storage folder
  async function loadJobPhotos(jobId) {
    var status = document.getElementById('photoStatus');
    if (status) { status.textContent = 'Loading photos...'; status.style.color = '#4a9eff'; }
    var client = supabase.createClient(SUPA_URL, SUPA_KEY);
    // Pre-load customer-uploaded photos from job_photos table by customer_id
    try {
      var custPhotos = await client.from('job_photos')
        .select('*')
        .or('job_id.eq.' + String(jobId) + ',customer_id.eq.' + String(jobId));
      if (custPhotos.data && custPhotos.data.length) {
        if (!jobPhotos[jobId]) jobPhotos[jobId] = [];
        custPhotos.data.forEach(function(p) {
          var exists = jobPhotos[jobId].find(function(x){ return x.path === p.path; });
          if (!exists) jobPhotos[jobId].push(p);
        });
      }
    } catch(e) { console.warn('Customer photo preload:', e); }

    // Try DB table first
    var result = await client.from('job_photos').select('*').eq('job_id', String(jobId)).order('uploaded_at', { ascending: true });

    if (!result.error && result.data && result.data.length > 0) {
      jobPhotos[jobId] = result.data;
      if (status) status.textContent = '';
      renderPhotoGrid();
      return;
    }

    // Fallback: scan storage bucket folder directly (catches pre-table uploads like Steve's)
    if (status) { status.textContent = 'Scanning storage for photos...'; status.style.color = '#4a9eff'; }
    var listResult = await client.storage.from('job_photos').list('jobs/' + String(jobId), { limit: 100, sortBy: { column: 'name', order: 'asc' } });

    if (listResult.error || !listResult.data || !listResult.data.length) {
      jobPhotos[jobId] = [];
      if (status) { status.textContent = ''; }
      renderPhotoGrid();
      return;
    }

    // Build photo records from storage listing and backfill DB
    var photos = [];
    for (var i = 0; i < listResult.data.length; i++) {
      var item = listResult.data[i];
      if (!item.name || item.name === '.emptyFolderPlaceholder') continue;
      var path = 'jobs/' + String(jobId) + '/' + item.name;
      var urlResult = client.storage.from('job_photos').getPublicUrl(path);
      var publicUrl = urlResult.data.publicUrl;
      var photoRecord = {
        job_id: String(jobId),
        url: publicUrl,
        path: path,
        label: 'Additional Photos',
        uploaded_at: item.created_at || new Date().toISOString()
      };
      // Insert into DB so it shows next time
      var ins = await client.from('job_photos').insert(photoRecord).select();
      var saved = (ins.data && ins.data[0]) ? ins.data[0] : photoRecord;
      photos.push(saved);
    }

    jobPhotos[jobId] = photos;
    if (status) { status.textContent = photos.length > 0 ? '✓ Found ' + photos.length + ' existing photo(s) — AI labels loading...' : ''; status.style.color = '#8DC63F'; }
    renderPhotoGrid();

    // Only AI-label photos that have NO label yet (null or empty string)
    // Never re-runs on photos already labeled — prevents flash/reload on every open
    var needsLabel = photos.filter(function(p) { return !p.label || p.label.trim() === ''; });
    if (needsLabel.length > 0) {
      relabelStoragePhotos(jobId, needsLabel, client);
    }
  }

  async function relabelStoragePhotos(jobId, photos, client) {
    var status = document.getElementById('photoStatus');
    if (status) { status.textContent = 'Labeling ' + photos.length + ' new photo(s)...'; status.style.color = '#4a9eff'; }
    for (var i = 0; i < photos.length; i++) {
      var p = photos[i];
      try {
        // Fetch image as blob for AI labeling
        var resp = await fetch(p.url);
        var blob = await resp.blob();
        var file = new File([blob], p.path.split('/').pop(), { type: blob.type });
        var label = await aiLabelPhoto(file);
        // Update DB
        if (p.id) await client.from('job_photos').update({ label: label }).eq('id', p.id);
        // Update local cache
        var local = (jobPhotos[jobId]||[]).find(function(x){ return x.path === p.path; });
        if (local) local.label = label;
        if (status) status.textContent = 'Labeling photo ' + (i+1) + ' of ' + photos.length + '...';
        renderPhotoGrid();
      } catch(e) { console.warn('Relabel failed for', p.path, e); }
    }
    if (status) { status.textContent = '✓ All photos labeled'; status.style.color = '#8DC63F'; setTimeout(function(){ if(status) status.textContent=''; }, 3000); }
  }

  function renderPhotoGrid() {
    var grid = document.getElementById('photoGrid');
    if (!grid) return;
    var photos = jobPhotos[currentJobId] || [];

    if (!photos.length) {
      grid.innerHTML = '<div class="photo-empty-state">&#128247; No photos yet</div>';
      return;
    }

    // Group by AI label
    var groups = {};
    photos.forEach(function(p) {
      var k = p.label || 'Additional Photos';
      if (!groups[k]) groups[k] = [];
      groups[k].push(p);
    });

    // Sort groups by defined category order
    var keys = PHOTO_CATEGORIES.filter(function(cat) { return groups[cat]; });
    // Add any unexpected categories at the end
    Object.keys(groups).forEach(function(k) { if (keys.indexOf(k) === -1) keys.push(k); });
    var h = '<div class="photo-summary-bar">&#128247; ' + photos.length + ' photo' + (photos.length !== 1 ? 's' : '') + ' across ' + keys.length + ' categor' + (keys.length !== 1 ? 'ies' : 'y') + '</div>';

    keys.forEach(function(label) {
      var grp = groups[label];
      h += '<div class="photo-group">' +
        '<div class="photo-group-header">' +
          '<div class="photo-group-label">' + label + '</div>' +
          '<div class="photo-group-count">' + grp.length + ' photo' + (grp.length !== 1 ? 's' : '') + '</div>' +
        '</div>' +
        '<div class="photo-group-grid">';

      grp.forEach(function(p) {
        var purl = p.url || '';
        var ppath = p.path || '';
        var pid = String(p.id || '');
        var qFlag = p.quality_flag || 'good';
        var qNote = p.quality_note || '';
        var uploadedBy = p.uploaded_by || 'tech';
        var flagBadge = '';
        if (qFlag === 'needs_retake') {
          flagBadge = '<div style="position:absolute;top:4px;left:4px;background:rgba(255,170,0,0.92);color:#1A1A1A;font-size:0.55rem;font-weight:700;padding:2px 6px;border-radius:4px;line-height:1.4;" title="' + qNote + '">⚠ RETAKE</div>';
        } else if (qFlag === 'wrong_category') {
          flagBadge = '<div style="position:absolute;top:4px;left:4px;background:rgba(239,68,68,0.92);color:#fff;font-size:0.55rem;font-weight:700;padding:2px 6px;border-radius:4px;line-height:1.4;">✗ WRONG CAT</div>';
        }
        var sourceBadge = uploadedBy === 'customer'
          ? '<div style="position:absolute;bottom:24px;right:4px;background:rgba(100,180,255,0.85);color:#fff;font-size:0.5rem;font-weight:700;padding:2px 5px;border-radius:3px;">CUSTOMER</div>'
          : '';
        h += '<div class="photo-card" title="' + (qNote || label) + '">' +
          '<div class="photo-img-wrap" style="position:relative;">' +
            '<img class="photo-thumb" src="' + purl + '" loading="lazy" title="' + label + '" ' +
              'data-href="' + purl + '" onclick="openPhoto(this)" ' +
              'onerror="this.style.display=\'none\'">' +
            flagBadge + sourceBadge +
            '<button class="photo-delete-btn" data-path="' + ppath + '" data-id="' + pid + '" ' +
              'onclick="deletePhoto(this)" title="Delete">&#10005;</button>' +
            '<div class="photo-expand-btn" data-href="' + purl + '" onclick="openPhoto(this)">&#8599;</div>' +
          '</div>' +
          '<div class="photo-card-label">' + label + (qFlag !== 'good' ? ' ⚠' : '') + '</div>' +
        '</div>';
      });

      h += '</div></div>';
    });

    grid.innerHTML = h;
  }

  async function deletePhoto(btn) {
    var path = btn.dataset.path;
    var id = btn.dataset.id;
    if (!confirm('Delete this photo?')) return;
    var client = supabase.createClient(SUPA_URL, SUPA_KEY);
    if (path) await client.storage.from('job_photos').remove([path]);
