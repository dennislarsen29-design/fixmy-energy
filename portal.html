<!DOCTYPE html>
<!-- Solar Review Portal | Jobs Tab Update -->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <title>Solar Review — Customer Portal</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:sans-serif; background:#1A1A1A; color:#F3EDE3; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .box { width:100%; max-width:400px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:40px 32px; margin:24px; }
    h1 { font-size:1.4rem; margin-bottom:4px; }
    h1 span { color:#8DC63F; }
    p { font-size:0.8rem; color:#aaa; margin-bottom:28px; }
    label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.08em; color:#888; display:block; margin-bottom:6px; }
    input { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:13px 14px; color:#F3EDE3; font-size:0.9rem; margin-bottom:16px; outline:none; }
    input:focus { border-color:#8DC63F; }
    button { width:100%; background:#8DC63F; color:#1A1A1A; border:none; border-radius:100px; padding:15px; font-size:0.9rem; font-weight:700; cursor:pointer; margin-top:4px; }
    button:hover { opacity:0.88; }
    .err { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:10px 14px; font-size:0.78rem; color:#ef4444; margin-top:12px; display:none; }
    .hint { font-size:0.7rem; color:#666; text-align:center; margin-top:16px; }
    #dashboard { display:none; max-width:700px; width:100%; margin:24px; }
    .dash-header { background:rgba(255,255,255,0.03); border-bottom:1px solid rgba(255,255,255,0.08); padding:16px 24px; display:flex; justify-content:space-between; align-items:center; border-radius:12px 12px 0 0; }
    .dash-body { padding:24px; }
    .dash-title { font-size:1rem; font-weight:700; }
    .sign-out { font-size:0.72rem; color:#888; cursor:pointer; text-decoration:underline; background:none; border:none; width:auto; padding:0; }
    .card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:18px; margin-bottom:14px; }
    .info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:20px; }
    .info-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:14px; }
    .info-label { font-size:0.62rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:#666; margin-bottom:6px; }
    .info-val { font-size:0.88rem; font-weight:600; }
    .sect-label { font-size:0.66rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:#666; margin:20px 0 10px; }
    .timeline { display:flex; gap:0; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:14px 10px; min-width:360px; }
    .step { display:flex; flex-direction:column; align-items:center; flex:1; position:relative; }
    .step:not(:last-child)::after { content:''; position:absolute; top:13px; left:50%; width:100%; height:2px; background:rgba(255,255,255,0.08); }
    .step.done::after,.step.active::after { background:#8DC63F; }
    .step-dot { width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,0.08); color:#666; display:flex; align-items:center; justify-content:center; font-size:0.68rem; font-weight:700; position:relative; z-index:1; }
    .step.done .step-dot { background:#8DC63F; color:#1A1A1A; }
    .step.active .step-dot { background:#1A1A1A; border:2px solid #8DC63F; color:#8DC63F; }
    .step-label { font-size:0.56rem; color:#666; text-align:center; margin-top:5px; line-height:1.3; }
    .step.active .step-label { color:#8DC63F; font-weight:600; }
    .step.done .step-label { color:#aaa; }
    .upload-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:20px; }
    .upload-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:16px; }
    .upload-status { font-size:0.68rem; font-weight:600; padding:3px 10px; border-radius:100px; display:inline-block; margin-bottom:10px; background:rgba(255,255,255,0.06); color:#666; }
    .upload-status.ok { background:rgba(141,198,63,0.15); color:#8DC63F; }
    input[type=file]{display:none;}
    .btn-upload { background:#8DC63F; color:#1A1A1A; border:none; border-radius:100px; padding:8px 18px; font-size:0.72rem; font-weight:700; cursor:pointer; }
    .inv-line { display:flex; justify-content:space-between; font-size:0.78rem; padding:7px 0; border-top:1px solid rgba(255,255,255,0.06); }
    .inv-total { display:flex; justify-content:space-between; font-size:0.88rem; font-weight:700; padding-top:10px; margin-top:4px; border-top:2px solid rgba(255,255,255,0.1); }
    .inv-total-amt { color:#8DC63F; font-size:1rem; }
    .badge { font-size:0.64rem; font-weight:700; padding:4px 10px; border-radius:100px; }
    .badge-paid,.badge-signed { background:rgba(141,198,63,0.15); color:#8DC63F; }
    .badge-pending,.badge-awaiting { background:rgba(255,170,0,0.12); color:#ffaa00; }
    .badge-draft { background:rgba(255,255,255,0.06); color:#888; }
    .badge-overdue { background:rgba(239,68,68,0.12); color:#ef4444; }
    .badge-sent { background:rgba(74,158,255,0.12); color:#4a9eff; }
    .btn-lime { background:#8DC63F; color:#1A1A1A; border:none; border-radius:100px; padding:10px 20px; font-size:0.75rem; font-weight:700; cursor:pointer; text-decoration:none; display:inline-block; }
    .btn-ghost { background:rgba(255,255,255,0.07); color:#F3EDE3; border:1px solid rgba(255,255,255,0.12); border-radius:100px; padding:10px 20px; font-size:0.75rem; font-weight:700; text-decoration:none; display:inline-block; }
    .btn-blue { background:#4a9eff; color:white; border:none; border-radius:100px; padding:10px 20px; font-size:0.75rem; font-weight:700; text-decoration:none; display:inline-block; }
    .notes-ta { width:100%; background:transparent; border:none; outline:none; color:#F3EDE3; font-family:sans-serif; font-size:0.82rem; line-height:1.6; resize:vertical; min-height:80px; }
    .notes-ta::placeholder { color:#555; }
    .cta-card { background:rgba(141,198,63,0.06); border:1px solid rgba(141,198,63,0.2); border-radius:12px; padding:20px; display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap; margin-top:20px; }
    /* ADMIN */
    .admin-header-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .admin-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:16px; }
    @media(max-width:500px){ .admin-stats { grid-template-columns:repeat(2,1fr); } }
    .admin-stat-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:14px 12px; cursor:pointer; transition:border-color 0.2s; text-align:center; }
    .admin-stat-card:hover, .admin-stat-card.active { border-color:#8DC63F; background:rgba(141,198,63,0.06); }
    .admin-stat-val { font-size:1.4rem; font-weight:700; margin-bottom:4px; }
    .admin-stat-label { font-size:0.62rem; color:#666; text-transform:uppercase; letter-spacing:0.06em; }
    .admin-toolbar { display:flex; flex-direction:column; gap:10px; margin-bottom:12px; }
    .admin-search { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:12px 14px; color:#F3EDE3; font-size:0.85rem; font-family:sans-serif; outline:none; }
    .admin-search:focus { border-color:#8DC63F; }
    .admin-filters { display:flex; gap:6px; flex-wrap:wrap; }
    .filter-btn { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:100px; padding:6px 14px; font-size:0.72rem; color:#aaa; cursor:pointer; transition:all 0.15s; }
    .filter-btn:hover { border-color:#8DC63F; color:#8DC63F; }
    .filter-btn.active { background:rgba(141,198,63,0.12); border-color:#8DC63F; color:#8DC63F; font-weight:600; }
    .admin-actions-bar { display:flex; gap:8px; margin-bottom:16px; }
    .admin-action-btn { background:#8DC63F; color:#1A1A1A; border:none; border-radius:100px; padding:10px 18px; font-size:0.75rem; font-weight:700; cursor:pointer; }
    .admin-action-btn.ghost { background:rgba(255,255,255,0.06); color:#F3EDE3; border:1px solid rgba(255,255,255,0.1); }
    .lead-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:16px; margin-bottom:10px; transition:border-color 0.2s; }
    .lead-card:hover { border-color:rgba(255,255,255,0.15); }
    .lead-card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
    .lead-name { font-weight:700; font-size:0.92rem; margin-bottom:4px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .lead-meta { font-size:0.72rem; color:#666; margin-bottom:2px; }
    .lead-addr { font-size:0.72rem; color:#555; }
    .step-pill { font-size:0.62rem; font-weight:600; padding:3px 8px; border-radius:100px; }
    .mini-badge { font-size:0.6rem; font-weight:600; padding:2px 8px; border-radius:100px; margin-right:4px; }
    .lead-card-actions { display:flex; gap:6px; align-items:flex-start; flex-shrink:0; }
    .lead-btn { border:none; border-radius:100px; padding:8px 14px; font-size:0.72rem; font-weight:700; cursor:pointer; text-decoration:none; }
    .lead-btn.lime { background:#8DC63F; color:#1A1A1A; }
    .lead-btn.ghost { background:rgba(255,255,255,0.07); color:#F3EDE3; border:1px solid rgba(255,255,255,0.1); }
    .lead-progress { display:flex; align-items:center; }
    .prog-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.1); }
    .prog-dot.filled { background:#8DC63F; }
    .prog-line { flex:1; height:2px; background:rgba(255,255,255,0.08); }
    .prog-line.filled { background:#8DC63F; }
    .editor-panel { background:rgba(141,198,63,0.04); border:1px solid rgba(141,198,63,0.2); border-radius:14px; padding:22px; margin-bottom:16px; }
    .editor-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
    .editor-section-title { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:#555; margin:16px 0 10px; border-top:1px solid rgba(255,255,255,0.06); padding-top:14px; }
    .ed-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:520px){ .ed-grid { grid-template-columns:1fr; } }
    .ed-full { margin-bottom:12px; }
    .ed-label { font-size:0.64rem; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:#666; display:block; margin-bottom:5px; }
    .ed-input { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px 12px; color:#F3EDE3; font-size:0.82rem; font-family:sans-serif; outline:none; box-sizing:border-box; }
    .ed-input:focus { border-color:#8DC63F; }
    .editor-footer { display:flex; align-items:center; gap:10px; margin-top:18px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.06); flex-wrap:wrap; }
    .cust-edit-input { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:10px 12px; color:#F3EDE3; font-size:0.82rem; font-family:sans-serif; outline:none; box-sizing:border-box; }
    .cust-edit-input:focus { border-color:#8DC63F; }
    .type-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:100px; padding:9px 18px; font-size:0.75rem; font-weight:600; color:#888; cursor:pointer; transition:all 0.15s; }
    .type-btn.active { background:rgba(141,198,63,0.12); border-color:#8DC63F; color:#8DC63F; }
    .type-btn:hover { border-color:#8DC63F; color:#8DC63F; }
    .solar-stat-box { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:10px 6px; text-align:center; }
    .ssv { font-size:1rem; font-weight:700; color:#8DC63F; margin-bottom:3px; }
    .ssl { font-size:0.6rem; color:#666; text-transform:uppercase; letter-spacing:0.06em; }
    .nl-check-label { display:flex; align-items:center; gap:10px; font-size:0.82rem; cursor:pointer; padding:8px 12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:8px; }
    .nl-check { width:16px; height:16px; accent-color:#8DC63F; cursor:pointer; flex-shrink:0; }
    .nl-check-label:has(.nl-check:checked) { background:rgba(141,198,63,0.08); border-color:rgba(141,198,63,0.3); color:#8DC63F; }
    /* PORTAL TAB NAV */
    .portal-tab-nav { display:flex; gap:8px; padding:12px 16px 0; border-bottom:1px solid #2a2a2a; margin-bottom:16px; }
    .portal-tab { background:none; border:none; padding:8px 16px; font-size:0.78rem; font-weight:600; color:#666; cursor:pointer; border-bottom:2px solid transparent; border-radius:0; transition:all 0.2s; }
    .portal-tab.active { color:#8DC63F; border-bottom-color:#8DC63F; }
    .portal-tab:hover { color:#ccc; }
    /* JOBS LIST */
    .jobs-empty { padding:40px; text-align:center; color:#555; font-size:0.85rem; }
    .job-card { background:#1e1e1e; border:1px solid #2a2a2a; border-radius:10px; padding:16px; margin-bottom:10px; cursor:pointer; transition:border-color 0.2s; }
    .job-card:hover { border-color:#8DC63F44; }
    .job-card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .job-name { font-size:0.95rem; font-weight:700; color:#eee; }
    .job-status-pill { font-size:0.68rem; font-weight:600; padding:3px 10px; border-radius:100px; }
    .job-addr { font-size:0.78rem; color:#888; margin-bottom:4px; }
    .job-meta { font-size:0.72rem; color:#555; }
    /* JOB DETAIL */
    .job-back-btn { background:none; border:none; color:#8DC63F; font-size:0.82rem; font-weight:600; cursor:pointer; padding:8px 0 12px; display:flex; align-items:center; gap:6px; }
    .job-detail-card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; overflow:hidden; }
    .job-detail-header { display:flex; justify-content:space-between; align-items:flex-start; padding:16px; border-bottom:1px solid #2a2a2a; }
    .job-detail-name { font-size:1.05rem; font-weight:700; color:#eee; margin-bottom:4px; }
    .job-detail-addr { font-size:0.78rem; color:#888; }
    .job-status-select { background:#252525; border:1px solid #333; color:#ccc; padding:6px 10px; border-radius:8px; font-size:0.75rem; cursor:pointer; }
    .job-section { padding:16px; border-bottom:1px solid #222; }
    .job-section:last-child { border-bottom:none; }
    .job-section-title { font-size:0.78rem; font-weight:700; color:#8DC63F; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:12px; }
    .job-upload-area { border:2px dashed #333; border-radius:10px; padding:24px; text-align:center; transition:border-color 0.2s; margin-bottom:12px; }
    .job-upload-area:hover { border-color:#8DC63F66; }
    .job-upload-icon { font-size:2rem; margin-bottom:8px; }
    .job-upload-label { font-size:0.85rem; color:#aaa; font-weight:600; margin-bottom:4px; }
    .job-upload-sub { font-size:0.72rem; color:#555; margin-bottom:10px; }
    .job-upload-btn { background:#8DC63F; color:#1A1A1A; padding:8px 18px; border-radius:100px; font-size:0.75rem; font-weight:700; cursor:pointer; display:inline-block; }
    .job-upload-status { font-size:0.78rem; margin-top:8px; min-height:20px; }
    .photo-grid { margin-top:8px; }
    .photo-group { margin-bottom:16px; }
    .photo-group-label { font-size:0.72rem; font-weight:700; color:#aaa; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }
    .photo-group-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:8px; }
    .photo-thumb-wrap { border-radius:8px; overflow:hidden; aspect-ratio:1; background:#222; }
    .photo-thumb { width:100%; height:100%; object-fit:cover; cursor:pointer; transition:opacity 0.2s; }
    .photo-thumb:hover { opacity:0.8; }
    .job-field-row { display:flex; gap:8px; margin-bottom:8px; }
    .job-input { flex:1; background:#252525; border:1px solid #333; color:#ccc; padding:8px 12px; border-radius:8px; font-size:0.8rem; }
    .job-save-btn { background:#8DC63F; color:#1A1A1A; border:none; padding:8px 14px; border-radius:8px; font-size:0.75rem; font-weight:700; cursor:pointer; white-space:nowrap; }
    .job-doc-link { font-size:0.78rem; color:#4a9eff; text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
    .upgrade-empty { font-size:0.78rem; color:#555; padding:8px 0; }
    .upgrade-item-row { display:grid; grid-template-columns:1fr 120px 32px; gap:8px; margin-bottom:8px; align-items:center; }
    .upgrade-desc,.upgrade-cost { background:#252525; border:1px solid #333; color:#ccc; padding:7px 10px; border-radius:8px; font-size:0.8rem; }
    .upgrade-remove-btn { background:#2a2a2a; border:1px solid #333; color:#888; border-radius:6px; cursor:pointer; font-size:0.85rem; width:32px; height:32px; }
    .upgrade-remove-btn:hover { color:#ef4444; border-color:#ef4444; }
    .job-add-item-btn { background:#252525; border:1px solid #333; color:#8DC63F; padding:7px 14px; border-radius:8px; font-size:0.78rem; font-weight:600; cursor:pointer; margin-top:4px; }
    .upgrade-total-row { display:flex; justify-content:space-between; align-items:center; margin-top:14px; padding-top:12px; border-top:1px solid #2a2a2a; font-size:0.82rem; color:#aaa; font-weight:600; }
    .upgrade-total-val { font-size:1.1rem; font-weight:700; color:#8DC63F; }
    .job-notes-ta { width:100%; background:#252525; border:1px solid #333; color:#ccc; padding:10px; border-radius:8px; font-size:0.82rem; line-height:1.6; min-height:80px; resize:vertical; margin-bottom:10px; box-sizing:border-box; }

    /* ── PHOTO GRID ENHANCED ────────────────────────────── */
    .photo-summary-bar { font-size:0.75rem; color:#8DC63F; font-weight:600; margin-bottom:14px; padding:8px 12px; background:rgba(141,198,63,0.08); border-radius:8px; border:1px solid rgba(141,198,63,0.2); }
    .photo-empty-state { font-size:0.82rem; color:#555; padding:20px; text-align:center; border:2px dashed #2a2a2a; border-radius:10px; margin-top:8px; }
    .photo-group { margin-bottom:20px; }
    .photo-group-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid #222; }
    .photo-group-label { font-size:0.78rem; font-weight:700; color:#ccc; }
    .photo-group-count { font-size:0.68rem; color:#555; }
    .photo-group-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; }
    .photo-card { display:flex; flex-direction:column; gap:6px; }
    .photo-img-wrap { position:relative; aspect-ratio:1; background:#1e1e1e; border-radius:10px; overflow:hidden; border:1px solid #2a2a2a; }
    .photo-thumb { width:100%; height:100%; object-fit:cover; cursor:pointer; transition:opacity 0.2s; display:block; }
    .photo-thumb:hover { opacity:0.85; }
    .photo-card-label { font-size:0.65rem; color:#aaa; text-align:center; line-height:1.3; padding:0 2px; font-weight:500; }
    .photo-delete-btn { position:absolute; top:5px; right:5px; background:rgba(0,0,0,0.75); border:none; color:#fff; border-radius:50%; width:22px; height:22px; font-size:0.65rem; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.15s; padding:0; z-index:2; }

    .photo-delete-btn:hover { background:#ef4444; }
    .photo-expand-btn { position:absolute; bottom:5px; right:5px; background:rgba(0,0,0,0.65); border:none; color:#fff; border-radius:6px; width:22px; height:22px; font-size:0.75rem; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.15s; z-index:2; }
    .photo-img-wrap:hover .photo-expand-btn { opacity:1; }
    .photo-load-err { display:flex; align-items:center; justify-content:center; height:100%; font-size:0.7rem; color:#ef4444; }

    /* ── SUBSECTION TITLES ──────────────────────────────── */
    .job-subsection-title { font-size:0.72rem; font-weight:600; color:#aaa; margin-bottom:8px; display:flex; align-items:center; gap:6px; }

    /* ── ASSESSMENT UPLOAD ──────────────────────────────── */
    .assessment-sub { padding-top:4px; }

    .rep-comm-row { display:flex; justify-content:space-between; align-items:center; font-size:0.82rem; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
    .rep-comm-row:last-child { border-bottom:none; font-weight:700; color:#8DC63F; }
    .rep-comm-label { color:#888; }
    .rep-tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .rep-tab { padding:7px 16px; border-radius:100px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:#888; font-size:0.72rem; font-weight:600; cursor:pointer; text-transform:uppercase; letter-spacing:0.05em; transition:all 0.2s; }
    .rep-tab.active { background:#8DC63F; color:#1A1A1A; border-color:#8DC63F; }
    .rep-new-lead-btn { background:#8DC63F; color:#1A1A1A; border:none; border-radius:100px; padding:10px 20px; font-size:0.78rem; font-weight:700; cursor:pointer; }

    /* ── TECH / FIELD VIEW ── */
    .tech-header { background:rgba(255,165,0,0.08); border:1px solid rgba(255,165,0,0.2); border-radius:12px; padding:16px 20px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
    .tech-name { font-size:1rem; font-weight:700; }
    .tech-badge { background:rgba(255,165,0,0.15); color:#ffa500; font-size:0.68rem; font-weight:700; padding:4px 12px; border-radius:100px; text-transform:uppercase; letter-spacing:0.06em; }
    .tech-job-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:18px; margin-bottom:12px; }
    .tech-job-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; flex-wrap:wrap; gap:8px; }

    .tech-btn-primary { background:#8DC63F; color:#1A1A1A; }
    .tech-btn-secondary { background:rgba(255,255,255,0.08); color:#eee; }

    .tech-checklist { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:14px; margin-bottom:12px; }

    .tech-check-item.checked .tech-check-box { background:#8DC63F; border-color:#8DC63F; color:#1A1A1A; font-size:0.75rem; }

    .tech-photo-zone:hover, .tech-photo-zone.dragover { border-color:#8DC63F; background:rgba(141,198,63,0.05); }

    .tech-notes-area { width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:12px 14px; color:#F3EDE3; font-family:sans-serif; font-size:0.85rem; resize:vertical; min-height:80px; outline:none; margin-bottom:10px; }
    .tech-notes-area:focus { border-color:#8DC63F; }
    .tech-save-btn { background:#8DC63F; color:#1A1A1A; border:none; border-radius:100px; padding:10px 24px; font-size:0.78rem; font-weight:700; cursor:pointer; width:100%; }
    .tech-section-title { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#ffa500; margin:14px 0 8px; }
    .tech-no-jobs { text-align:center; padding:40px 20px; color:#555; font-size:0.88rem; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h1>Solar<span style="color:#8DC63F">.</span>Review</h1>
  <p id="loginSubtitle">Sign in to your portal</p>

  <div class="role-tabs">
    <div class="role-tab active" id="roleCustomer" onclick="setRole('customer')">Customer</div>
    <div class="role-tab" id="roleSalesRep" onclick="setRole('rep')">Sales Rep</div>
    <div class="role-tab" id="roleTech" onclick="setRole('tech')">Field Tech</div>
    <div class="role-tab" id="roleAdmin" onclick="setRole('admin')">Admin</div>
  </div>

  <label>Email Address</label>
  <input type="email" id="emailInput" placeholder="your@email.com"/>
  <label id="codeLabel">Access Code</label>
  <input type="password" id="codeInput" placeholder="Your 10-digit phone number"/>
  <button id="loginBtn" onclick="handleLogin()">Access My Portal</button>
  <div class="err" id="errMsg"></div>
  <div class="hint" id="loginHint">Access code is your 10-digit phone number</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <div class="dash-title">Solar<span style="color:#8DC63F">.</span>Review</div>
    <div style="display:flex;gap:16px;align-items:center;">
      <span id="userName" style="font-size:0.75rem;color:#aaa;"></span>
      <button class="sign-out" onclick="signOut()">Sign Out</button>
    </div>
  </div>
  <div class="dash-body" id="dashBody">Loading...</div>
</div>

<script>
  var ADMIN_EMAIL   = 'admin@solareview.com';
  var CURRENT_ROLE  = 'customer'; // customer | rep | tech | admin

  // Sales rep accounts — add reps here (or pull from Supabase)
  var SALES_REPS = [
    { email: 'rep1@solareview.com', code: 'rep1code', name: 'Rep 1', id: 'rep1' },
    { email: 'rep2@solareview.com', code: 'rep2code', name: 'Rep 2', id: 'rep2' },
  ];

  // Field techs
  var TECHS = [
    { email: 'tech@solareview.com', code: 'tech2026', name: 'Dennis (Tech)', id: 'tech1' },
    { email: 'jon@solareview.com',  code: 'jon2026',  name: 'Jon Klos',       id: 'tech2' },
  ];

  function setRole(role) {
    CURRENT_ROLE = role;
    ['customer','rep','tech','admin'].forEach(function(r) {
      document.getElementById('role' + r.charAt(0).toUpperCase() + r.slice(1)).classList.toggle('active', r === role);
    });
    var hints = {
      customer: 'Access code is your 10-digit phone number',
      rep:      'Use your assigned rep email and access code',
      tech:     'Use your tech email and access code',
      admin:    'Admin access only'
    };
    var labels = {
      customer: 'Access Code (phone number)',
      rep:      'Rep Access Code',
      tech:     'Tech Access Code',
      admin:    'Admin Code'
    };
    var placeholders = {
      customer: 'Your 10-digit phone number',
      rep:      'Your rep access code',
      tech:     'Your tech access code',
      admin:    'SR2026admin'
    };
    document.getElementById('loginHint').textContent     = hints[role];
    document.getElementById('codeLabel').textContent     = labels[role];
    document.getElementById('codeInput').placeholder     = placeholders[role];
  }
  var GHL_WEBHOOK   = 'https://services.leadconnectorhq.com/hooks/gXWwbOVymY0iRfj7c1It/webhook-trigger/032a0503-c92f-4711-89c0-0a4659e8e4ff';
  var SHEETBEST_URL = 'https://api.sheetbest.com/sheets/cf351a87-0260-4633-aaa9-d955caf6c630';
  var GHL_BOOKING   = 'https://api.leadconnectorhq.com/widget/booking/UjlvHxE8AlyhG5frBkqr';
  var ADMIN_CODE    = 'SR2026admin';
  var SUPA_URL      = 'https://kbtobyoumvbcxfbugsid.supabase.co';
  var SUPA_KEY      = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtidG9ieW91bXZiY3hmYnVnc2lkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjY5MDcsImV4cCI6MjA5MDE0MjkwN30.nLE0TlMu43E4dNRxxjoc6P1OQMjfwXgonbA2MrCCrhk';
  var GKEY          = 'AIzaSyBedpPe3461c1mYiD8yxjDMkYvrJ4MQQpc';

  var currentUser = null;
  var adminView = 'dashboard';
  var adminCustomers = [];
  var adminFilter = 'all';
  var adminSearch = '';
  var currentJobId = null;
  var upgradeItems = [];
  var jobPhotos = {};

  function pushLeadToWebhooks(lead) {
    var data = Object.assign({ source:'portal-admin', timestamp: new Date().toISOString() }, lead);
    fetch(GHL_WEBHOOK, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) }).catch(function(e){ console.warn('GHL:', e); });
    fetch(SHEETBEST_URL, { method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, body:JSON.stringify([data]) }).catch(function(e){ console.warn('Sheets:', e); });
  }

  function showErr(msg) { var e = document.getElementById('errMsg'); e.textContent = msg; e.style.display = 'block'; }
  function showDash(name, content) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('userName').textContent = name;
    document.getElementById('dashBody').innerHTML = content;
  }
  function signOut() { sessionStorage.clear(); location.reload(); }

  async function handleLogin() {
    var btn = document.getElementById('loginBtn');
    var email = document.getElementById('emailInput').value.trim().toLowerCase();
    var code  = document.getElementById('codeInput').value.trim();
    document.getElementById('errMsg').style.display = 'none';
    if (!email) { showErr('Please enter your email address.'); return; }
    if (!code)  { showErr('Please enter your access code.'); return; }
    btn.textContent = 'Signing in...'; btn.disabled = true;

    // Admin login
    if (CURRENT_ROLE === 'admin' || (email === ADMIN_EMAIL && code === ADMIN_CODE)) {
      if (code === ADMIN_CODE) {
        sessionStorage.setItem('user', JSON.stringify({isAdmin:true, name:'Admin', role:'admin'}));
        loadAdminDashboard(); return;
      } else { showErr('Admin code incorrect.'); btn.textContent = 'Access My Portal'; btn.disabled = false; return; }
    }

    // Sales rep login
    if (CURRENT_ROLE === 'rep') {
      var rep = SALES_REPS.find(function(r) { return r.email === email && r.code === code; });
      if (rep) {
        sessionStorage.setItem('user', JSON.stringify({isRep:true, name:rep.name, id:rep.id, role:'rep'}));
        loadRepDashboard(rep); return;
      } else { showErr('Rep credentials not found.'); btn.textContent = 'Access My Portal'; btn.disabled = false; return; }
    }

    // Tech login
    if (CURRENT_ROLE === 'tech') {
      var tech = TECHS.find(function(t) { return t.email === email && t.code === code; });
      if (tech) {
        sessionStorage.setItem('user', JSON.stringify({isTech:true, name:tech.name, id:tech.id, role:'tech'}));
        loadTechDashboard(tech); return;
      } else { showErr('Tech credentials not found.'); btn.textContent = 'Access My Portal'; btn.disabled = false; return; }
    }
    var client;
    try { client = supabase.createClient(SUPA_URL, SUPA_KEY); }
    catch(e) { showErr('Connection error. Please refresh.'); btn.textContent = 'Access My Portal'; btn.disabled = false; return; }
    try {
      var resp = await client.from('customers').select('*').eq('email', email).single();
      if (resp.error || !resp.data) { showErr('Email not found.'); btn.textContent = 'Access My Portal'; btn.disabled = false; return; }
      var c = resp.data;
      function normalize(p) {
        var d = (p||'').replace(/[^0-9]/g,'');
        if (d.length===11 && d.charAt(0)==='1') d = d.slice(1);
        if (d.length>11) d = d.slice(-10);
        return d;
      }
      var match = (normalize(code).length>=10 && normalize(code)===normalize(c.phone))
               || (normalize(code).length>=10 && normalize(code)===normalize(c.access_code))
               || code===c.access_code || code===c.phone;
      if (!match) { showErr('Access code incorrect.'); btn.textContent = 'Access My Portal'; btn.disabled = false; return; }
      sessionStorage.setItem('user', JSON.stringify(c));
      loadCustomerDashboard(c);
    } catch(e) { showErr('Error: '+e.message); btn.textContent = 'Access My Portal'; btn.disabled = false; }
  }

  // ── ADMIN ──────────────────────────────────────────────────────────────────
  async function loadAdminDashboard() {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('userName').textContent = 'Solar Review Admin';
    document.getElementById('dashBody').innerHTML = '<p style="color:#aaa;padding:20px 0;">Loading...</p>';
    var tries = 0;
    while (!supabase && tries < 5) { await new Promise(function(r){setTimeout(r,400);}); tries++; }
    var client;
    try { client = supabase.createClient(SUPA_URL, SUPA_KEY); }
    catch(e) { document.getElementById('dashBody').innerHTML = '<p style="color:#ef4444;">Database unavailable. <button onclick="loadAdminDashboard()" style="width:auto;padding:8px 16px;font-size:0.75rem;background:#8DC63F;color:#1A1A1A;border:none;border-radius:100px;cursor:pointer;">Retry</button></p>'; return; }
    var resp = await client.from('customers').select('*').order('created_at', {ascending:false});
    adminCustomers = resp.data || [];
    renderAdminView('dashboard');
  }

  function renderAdminView(view) {
    adminView = view;
    var c = adminCustomers;
    if (adminSearch) { var q = adminSearch.toLowerCase(); c = c.filter(function(x){ return ((x.first_name||'')+(x.last_name||'')+(x.email||'')+(x.phone||'')+(x.address||'')).toLowerCase().includes(q); }); }
    if (adminFilter !== 'all') {
      c = c.filter(function(x){
        if (adminFilter==='new') return !x.step||x.step<=1;
        if (adminFilter==='active') return x.step>=2&&x.step<=5;
        if (adminFilter==='complete') return x.step>=6;
        if (adminFilter==='invoice') return x.invoice_status&&x.invoice_status!=='none'&&x.invoice_status!=='paid';
        if (adminFilter==='agreement') return x.agreement_status==='sent'||x.agreement_status==='pending';
        return true;
      });
    }
    var total = adminCustomers.length;
    var active = adminCustomers.filter(function(x){ return x.step>=2&&x.step<6; }).length;
    var invoicePending = adminCustomers.filter(function(x){ return x.invoice_status==='pending'||x.invoice_status==='sent'; }).length;
    var agreementPending = adminCustomers.filter(function(x){ return x.agreement_status==='sent'||x.agreement_status==='pending'; }).length;
    var statsHtml = '<div class="admin-stats">'+adminStat(total,'Total Leads','#8DC63F','all')+adminStat(active,'Active Jobs','#4a9eff','active')+adminStat(invoicePending,'Invoice Due','#ffaa00','invoice')+adminStat(agreementPending,'Awaiting Sig','#f97316','agreement')+'</div>';
    var searchBar = '<div class="admin-toolbar"><input type="text" id="adminSearchInput" class="admin-search" placeholder="Search leads..." value="'+adminSearch+'" oninput="adminSearch=this.value;renderAdminView(adminView)"/><div class="admin-filters">'+filterBtn('all','All')+filterBtn('new','New')+filterBtn('active','Active')+filterBtn('invoice','Invoice')+filterBtn('agreement','Sig Needed')+filterBtn('complete','Complete')+'</div></div>';
    var actionsBar = '<div class="admin-actions-bar"><button class="admin-action-btn" onclick="openNewLead()">+ New Lead</button><button class="admin-action-btn ghost" onclick="exportCSV()">&#8681; Export CSV</button></div>';
    var listHtml = '';
    if (!c.length) { listHtml = '<div style="padding:32px;text-align:center;color:#555;">No leads match this filter.</div>'; }
    else { c.forEach(function(cust) { listHtml += buildLeadCard(cust); }); }
    var portalNav = '<div class="portal-tab-nav"><button class="portal-tab active" onclick="renderAdminView(\'dashboard\')">&#128203; CRM</button><button class="portal-tab" onclick="renderJobsView()">&#128295; Jobs</button></div>';
    document.getElementById('dashBody').innerHTML = portalNav+'<div class="admin-header-row"><h2 style="font-size:1.1rem;font-weight:700;">Solar Review CRM</h2><span style="font-size:0.72rem;color:#555;">'+total+' leads total</span></div>'+statsHtml+searchBar+actionsBar+'<div id="editorSlot"></div><div id="leadList">'+listHtml+'</div>';
  }

  function setFilter(f) { adminFilter = f; renderAdminView(adminView); }

  // ── JOBS TAB ───────────────────────────────────────────────────────────────
  function renderJobsView() {
    adminView = 'jobs';
    var portalNav = '<div class="portal-tab-nav"><button class="portal-tab" onclick="renderAdminView(\'dashboard\')">&#128203; CRM</button><button class="portal-tab active" onclick="renderJobsView()">&#128295; Jobs</button></div>';
    var jobs = adminCustomers.filter(function(c){ return c.step>=3; });
    var listHtml = '';
    if (!jobs.length) { listHtml = '<div class="jobs-empty">No active jobs yet. Jobs appear here when a Diagnostic is sold (Step 3+).</div>'; }
    else {
      jobs.forEach(function(c) {
        var status = c.job_status||'pending';
        var statusLabel = {pending:'Pending Assessment',in_progress:'In Progress',ready:'Ready for Review',approved:'Approved'}[status]||status;
        var statusColor = {pending:'#ffaa00',in_progress:'#4a9eff',ready:'#f97316',approved:'#8DC63F'}[status]||'#888';
        listHtml += '<div class="job-card" data-id="'+c.id+'" onclick="openJob(this.dataset.id)">'+
          '<div class="job-card-top"><div class="job-name">'+(c.first_name||'')+' '+(c.last_name||'')+'</div>'+
          '<div class="job-status-pill" style="background:'+statusColor+'22;color:'+statusColor+';border:1px solid '+statusColor+'44;">'+statusLabel+'</div></div>'+
          '<div class="job-addr">'+(c.address||'No address')+'</div>'+
          '<div class="job-meta">'+(c.system_size?c.system_size+' kW system':'')+(c.utility?' &middot; '+c.utility:'')+'</div></div>';
      });
    }
    document.getElementById('dashBody').innerHTML = portalNav+
      '<div class="admin-header-row"><h2 style="font-size:1.1rem;font-weight:700;">Active Jobs</h2><span style="font-size:0.72rem;color:#555;">'+jobs.length+' jobs</span></div>'+
      '<div id="jobList">'+listHtml+'</div><div id="jobDetail" style="display:none;"></div>';
  }

  function openJob(id) {
    currentJobId = id;
    var c = adminCustomers.find(function(x){ return x.id==id; });
    if (!c) return;
    var status = c.job_status||'pending';
    var assessmentNotes = c.assessment_notes||'';
    var fieldNotes = c.field_notes||'';
    var jobNotes = c.job_notes||'';
    upgradeItems = c.upgrade_plan ? JSON.parse(c.upgrade_plan) : [];
    var itemsHtml = '';
    upgradeItems.forEach(function(item,i){ itemsHtml += buildUpgradeItemRow(item,i); });
    var statusOpts = [
      {v:'pending',l:'Pending Assessment'},
      {v:'in_progress',l:'In Progress'},
      {v:'ready',l:'Ready for Review'},

  function diagnoseBucketError(e, bucketName) {
    var code    = e.statusCode || e.status || e.error || '';
    var msg     = (e.message || '').toLowerCase();
    var rawMsg  = e.message || e.error || JSON.stringify(e);

    // Bucket name mismatch
    if (msg.includes('not found') || msg.includes('does not exist') || code === 404 || code === '404') {
      return {
        title: 'Bucket not found: "' + bucketName + '"',
        detail: 'The bucket name in the code does not match what exists in Supabase. ' +
                'Fix: Go to Supabase → Storage and confirm the exact bucket name (case-sensitive). ' +
                'Current code is looking for: <strong>' + bucketName + '</strong>'
      };
    }
    // Policy / RLS blocking
    if (msg.includes('policy') || msg.includes('violates') || msg.includes('unauthorized') || msg.includes('permission') || code === 403 || code === '403') {
      return {
        title: 'Permission denied — RLS policy missing or blocking upload',
        detail: 'Supabase is rejecting the upload because no INSERT policy exists for this bucket. ' +
                'Fix: Supabase → Storage → ' + bucketName + ' → Policies → New Policy → ' +
                'Operation: INSERT → Target: <strong>authenticated</strong> and <strong>anon</strong> → WITH CHECK: <code>bucket_id = \'' + bucketName + '\'</code>'
      };
    }
    // Auth / JWT issue
    if (msg.includes('jwt') || msg.includes('token') || msg.includes('auth') || code === 401 || code === '401') {
      return {
        title: 'Authentication error — invalid or expired session',
        detail: 'The Supabase API key or user session may be invalid. ' +
                'Fix: Check that SUPA_KEY in the portal matches your Supabase project\'s anon/public key under Settings → API.'
      };
    }
    // Row too large / file too big
    if (msg.includes('too large') || msg.includes('size') || code === 413 || code === '413') {
      return {
        title: 'File too large',
        detail: 'Supabase free tier allows up to 50MB per file. Reduce the image size or upgrade your Supabase plan.'
      };
    }
    // Network / CORS
    if (msg.includes('cors') || msg.includes('network') || msg.includes('failed to fetch')) {
      return {
        title: 'Network / CORS error',
        detail: 'The browser is blocking the request. Check that your Supabase project URL is correct and that the domain is allowed under Supabase → Auth → URL Configuration.'
      };
    }
    // Generic fallback
    return {
      title: 'Upload error: ' + rawMsg,
      detail: 'Raw error code: ' + code + '. Check the browser console (F12 → Console) for the full error object.'
    };
  }

  async function uploadPhotos(files) {
    if (!files.length || !currentJobId) return;
    var status = document.getElementById('photoStatus');
    if (!status) return;
    status.style.color = '#4a9eff';

    var BUCKET = 'JOB_PHOTOS';
    var client = supabase.createClient(SUPA_URL, SUPA_KEY);
    if (!jobPhotos[currentJobId]) jobPhotos[currentJobId] = [];
    var uploaded = 0;

    function showError(diag) {
      status.innerHTML =
        '<div style="color:#ef4444;font-size:0.82rem;line-height:1.6;">' +
        '<strong>&#9888; ' + diag.title + '</strong><br>' +
        '<span style="color:#aaa;font-size:0.74rem;">' + diag.detail + '</span>' +
        '</div>';
      console.error('[Photo Upload]', diag.title, diag.detail);
    }

    // Step 1 — test bucket access
    status.textContent = 'Checking storage access...';
    var testPath = 'jobs/' + String(currentJobId) + '/_test_' + Date.now() + '.txt';
    var testBlob = new Blob(['test'], { type: 'text/plain' });
    var testResult = await client.storage.from(BUCKET).upload(testPath, testBlob, { upsert: true });
    if (testResult.error) {
      showError(diagnoseBucketError(testResult.error, BUCKET));
      return;
    }
    await client.storage.from(BUCKET).remove([testPath]);

    // Step 2 — upload each file
    for (var i = 0; i < files.length; i++) {
      var file = files[i];
      status.textContent = 'Uploading ' + (i+1) + ' of ' + files.length + ' — ' + file.name;

      var safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      var path = 'jobs/' + String(currentJobId) + '/' + Date.now() + '_' + safeName;

      var uploadResult = await client.storage.from(BUCKET).upload(path, file, { upsert: true });
      if (uploadResult.error) {
        var diag = diagnoseBucketError(uploadResult.error, BUCKET);
        showError({ title: 'Photo ' + (i+1) + ' failed — ' + diag.title, detail: diag.detail });
        status.style.color = '#ef4444';
        continue;
      }

      var publicUrl = client.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;

      status.textContent = 'AI labeling ' + (i+1) + ' of ' + files.length + '...';
      var label = await aiLabelPhoto(file);

      var photoRecord = {
        job_id: String(currentJobId),
        url: publicUrl,
        path: path,
        label: label,
        uploaded_at: new Date().toISOString()
      };

      // Step 3 — save to DB
      var insertResult = await client.from('job_photos').insert(photoRecord).select();
      if (insertResult.error) {
        var ie = insertResult.error;
        var iMsg = (ie.message || '').toLowerCase();
        var iDetail = ie.message || JSON.stringify(ie);
        var iHint = ie.hint ? ' Hint: ' + ie.hint : '';
        var iCode = ie.code || '';
        var dbDiag = iCode === '42501' || iMsg.includes('policy')
          ? 'RLS policy is blocking INSERT on job_photos table. Fix: Supabase → Table Editor → job_photos → Policies → add INSERT policy for authenticated/anon.'
          : iCode === '23503'
          ? 'Foreign key error — the job_id ' + currentJobId + ' does not exist in the jobs table yet.'
          : iCode === '42P01'
          ? 'Table "job_photos" does not exist in Supabase. Check Table Editor.'
          : iDetail + iHint;
        status.innerHTML =
          '<div style="color:#ffaa00;font-size:0.82rem;line-height:1.6;">' +
          '<strong>&#9888; Photo uploaded but DB record failed</strong><br>' +
          '<span style="color:#aaa;font-size:0.74rem;">' + dbDiag + '</span>' +
          '</div>';
        console.warn('[DB Insert]', iDetail, ie);
        jobPhotos[currentJobId].push(photoRecord);
      } else {
        var savedRecord = (insertResult.data && insertResult.data[0]) ? insertResult.data[0] : photoRecord;
        jobPhotos[currentJobId].push(savedRecord);
        uploaded++;
      }
      renderPhotoGrid();
    }

    if (uploaded > 0) {
      status.textContent = '✓ ' + uploaded + ' of ' + files.length + ' photo(s) uploaded and labeled';
      status.style.color = '#8DC63F';
    } else if (!status.innerHTML.includes('&#9888;')) {
      status.textContent = 'All uploads failed — see error above';
      status.style.color = '#ef4444';
    }
  }

  async function aiLabelPhoto(file) {
    try {
      var base64 = await new Promise(function(resolve) {
        var reader = new FileReader();
        reader.onload = function(e) { resolve(e.target.result.split(',')[1]); };
        reader.readAsDataURL(file);
      });
      var response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 60,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: file.type, data: base64 } },
              { type: 'text', text: 'You are a solar technician assistant. Look at this photo and respond with ONLY a short label (3-6 words). Use one of these categories if it matches: "Roof Panel Array", "Inverter Unit", "Main Electrical Panel", "Utility Meter", "Battery Storage", "Wiring and Conduit", "Junction Box", "Damaged Panel", "Shading Issue", "Monitoring Device". Otherwise describe what you see in 3-6 words. No punctuation.' }
            ]
          }]
        })
      });
      var result = await response.json();
      if (result.content && result.content[0] && result.content[0].text) {
        return result.content[0].text.trim().replace(/[.!?,]/g, '');
      }
      return 'Field Photo';
    } catch(e) {
      console.warn('AI labeling failed:', e);
      return 'Field Photo';
    }
  }

  // Load photos — tries DB first, falls back to scanning Storage folder
  async function loadJobPhotos(jobId) {
    var status = document.getElementById('photoStatus');
    if (status) { status.textContent = 'Loading photos...'; status.style.color = '#4a9eff'; }
    var client = supabase.createClient(SUPA_URL, SUPA_KEY);

    // Try DB table first
    var result = await client.from('job_photos').select('*').eq('job_id', String(jobId)).order('uploaded_at', { ascending: true });

    if (!result.error && result.data && result.data.length > 0) {
      jobPhotos[jobId] = result.data;
      if (status) status.textContent = '';
      renderPhotoGrid();
      return;
    }

    // Fallback: scan storage bucket folder directly (catches pre-table uploads like Steve's)
    if (status) { status.textContent = 'Scanning storage for photos...'; status.style.color = '#4a9eff'; }
    var listResult = await client.storage.from('JOB_PHOTOS').list('jobs/' + String(jobId), { limit: 100, sortBy: { column: 'name', order: 'asc' } });

    if (listResult.error || !listResult.data || !listResult.data.length) {
      jobPhotos[jobId] = [];
      if (status) { status.textContent = ''; }
      renderPhotoGrid();
      return;
    }

    // Build photo records from storage listing and backfill DB
    var photos = [];
    for (var i = 0; i < listResult.data.length; i++) {
      var item = listResult.data[i];
      if (!item.name || item.name === '.emptyFolderPlaceholder') continue;
      var path = 'jobs/' + String(jobId) + '/' + item.name;
      var urlResult = client.storage.from('JOB_PHOTOS').getPublicUrl(path);
      var publicUrl = urlResult.data.publicUrl;
      var photoRecord = {
        job_id: String(jobId),
        url: publicUrl,
        path: path,
        label: 'Field Photo',
        uploaded_at: item.created_at || new Date().toISOString()
      };
      // Insert into DB so it shows next time
      var ins = await client.from('job_photos').insert(photoRecord).select();
      var saved = (ins.data && ins.data[0]) ? ins.data[0] : photoRecord;
      photos.push(saved);
    }

    jobPhotos[jobId] = photos;
    if (status) { status.textContent = photos.length > 0 ? '✓ Found ' + photos.length + ' existing photo(s) — AI labels loading...' : ''; status.style.color = '#8DC63F'; }
    renderPhotoGrid();

    // Now AI-label each unlabeled photo in background
    if (photos.length > 0) {
      relabelStoragePhotos(jobId, photos, client);
    }
  }

  async function relabelStoragePhotos(jobId, photos, client) {
    var status = document.getElementById('photoStatus');
    for (var i = 0; i < photos.length; i++) {
      var p = photos[i];
      if (p.label && p.label !== 'Field Photo') continue; // already labeled
      try {
        // Fetch image as blob for AI labeling
        var resp = await fetch(p.url);
        var blob = await resp.blob();
        var file = new File([blob], p.path.split('/').pop(), { type: blob.type });
        var label = await aiLabelPhoto(file);
        // Update DB
        if (p.id) await client.from('job_photos').update({ label: label }).eq('id', p.id);
        // Update local cache
        var local = (jobPhotos[jobId]||[]).find(function(x){ return x.path === p.path; });
        if (local) local.label = label;
        if (status) status.textContent = 'Labeling photo ' + (i+1) + ' of ' + photos.length + '...';
        renderPhotoGrid();
      } catch(e) { console.warn('Relabel failed for', p.path, e); }
    }
    if (status) { status.textContent = '✓ All photos labeled'; status.style.color = '#8DC63F'; setTimeout(function(){ if(status) status.textContent=''; }, 3000); }
  }

  function renderPhotoGrid() {
    var grid = document.getElementById('photoGrid');
    if (!grid) return;
    var photos = jobPhotos[currentJobId] || [];

    if (!photos.length) {
      grid.innerHTML = '<div class="photo-empty-state">&#128247; No photos yet</div>';
      return;
    }

    // Group by AI label
    var groups = {};
    photos.forEach(function(p) {
      var k = p.label || 'Field Photo';
      if (!groups[k]) groups[k] = [];
      groups[k].push(p);
    });

    var keys = Object.keys(groups);
    var h = '<div class="photo-summary-bar">&#128247; ' + photos.length + ' photo' + (photos.length !== 1 ? 's' : '') + ' across ' + keys.length + ' categor' + (keys.length !== 1 ? 'ies' : 'y') + '</div>';

    keys.forEach(function(label) {
      var grp = groups[label];
      h += '<div class="photo-group">' +
        '<div class="photo-group-header">' +
          '<div class="photo-group-label">' + label + '</div>' +
          '<div class="photo-group-count">' + grp.length + ' photo' + (grp.length !== 1 ? 's' : '') + '</div>' +
        '</div>' +
        '<div class="photo-group-grid">';

      grp.forEach(function(p) {
        var purl = p.url || '';
        var ppath = p.path || '';
        var pid = String(p.id || '');
        h += '<div class="photo-card">' +
          '<div class="photo-img-wrap">' +
            '<img class="photo-thumb" src="' + purl + '" loading="lazy" title="' + label + '" ' +
              'data-href="' + purl + '" onclick="openPhoto(this)" ' +
              'onerror="this.style.display=&quot;none&quot;">' +
            '<button class="photo-delete-btn" data-path="' + ppath + '" data-id="' + pid + '" ' +
              'onclick="deletePhoto(this)" title="Delete">&#10005;</button>' +
            '<div class="photo-expand-btn" data-href="' + purl + '" onclick="openPhoto(this)">&#8599;</div>' +
          '</div>' +
          '<div class="photo-card-label">' + label + '</div>' +
        '</div>';
      });

      h += '</div></div>';
    });

    grid.innerHTML = h;
  }

  function openPhoto(el) { var url = el.dataset.href || el.src || ''; if (url) window.open(url, '_blank'); }

  async function deletePhoto(btn) {
    var path = btn.dataset.path;
    var id = btn.dataset.id;
    if (!confirm('Delete this photo?')) return;
    var client = supabase.createClient(SUPA_URL, SUPA_KEY);
    if (path) await client.storage.from('JOB_PHOTOS').remove([path]);
    if (id) await client.from('job_photos').delete().eq('id', id);
    jobPhotos[currentJobId] = (jobPhotos[currentJobId] || []).filter(function(p) {
      return p.path !== path && String(p.id) !== String(id);
    });
    renderPhotoGrid();
  }

    var fullNotes=[owned?'Owned home: '+owned:'',roof?'Roof age: '+roof:'',checkNotes.length?checkNotes.join(' - '):'',notes].filter(Boolean).join(' | ');
    var newLead={first_name:first,last_name:(document.getElementById('nlLast').value||null),email:email,phone:phone,address:addr,monthly_bill:bill||null,access_code:digits,step:1,notes:fullNotes||null};
    var btn=document.querySelector('#newLeadPanel .lead-btn.lime');
    if(btn){btn.textContent='Creating...';btn.disabled=true;}
    try{
      var client=supabase.createClient(SUPA_URL,SUPA_KEY);

  async function geocodeAddress(address){
    if(!address) return null;
    try{ var r=await fetch('https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(address)+'&key='+GKEY); var d=await r.json(); if(d.status==='OK'&&d.results[0]) return d.results[0].geometry.location; }catch(e){}
    return null;
  }

  function ucCard(type,icon,title,desc){ return '<div class="upload-card"><div style="font-size:1.5rem;margin-bottom:8px;">'+icon+'</div><div style="font-weight:700;margin-bottom:5px;font-size:0.85rem;">'+title+'</div><div style="font-size:0.7rem;color:#aaa;line-height:1.5;margin-bottom:12px;">'+desc+'</div><div class="upload-status" id="ust-'+type+'">&#9888; Not Uploaded</div><input type="file" id="ufile-'+type+'" data-type="'+type+'" style="display:none;" onchange="handleUpload(this.dataset.type,this)"/><button class="btn-upload" data-type="'+type+'" onclick="triggerUpload(this.dataset.type)">Upload</button></div>'; }

  async function loadUploadStatus(custId){
    if(!custId) return;
    try{ var client=supabase.createClient(SUPA_URL,SUPA_KEY); var resp=await client.from('uploads').select('upload_type,status').eq('customer_id',custId); if(resp.data) resp.data.forEach(function(u){ var el=document.getElementById('ust-'+u.upload_type); if(el){el.textContent='&#10003; Uploaded';el.className='upload-status ok';} }); }catch(e){}
  }

  async function handleUpload(type,input){
    if(!input.files||!input.files[0]||!currentUser) return;
    var el=document.getElementById('ust-'+type);
    if(el){el.textContent='Uploading...';el.className='upload-status';}
    try{
      var client=supabase.createClient(SUPA_URL,SUPA_KEY);
      var file=input.files[0];
      var safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      var path=(currentUser.id||'anon')+'/'+type+'_'+Date.now()+'_'+safeName;
      var {data,error}=await client.storage.from('customer-docs').upload(path,file,{upsert:true});
      if(error){if(el) el.textContent='Error: '+(error.message||'Upload failed');return;}
      await client.from('uploads').upsert({customer_id:currentUser.id,upload_type:type,file_name:file.name,status:'uploaded'},{onConflict:'customer_id,upload_type'});
      if(el){el.textContent='&#10003; Uploaded';el.className='upload-status ok';}
    }catch(e){if(el) el.textContent='Failed: '+(e.message||'Unknown error');}
  }

  async function saveNotes(){
    if(!currentUser||!currentUser.id) return;
    var notes=document.getElementById('notesArea').value;
    try{ var client=supabase.createClient(SUPA_URL,SUPA_KEY); await client.from('customers').update({notes:notes}).eq('id',currentUser.id); var el=document.getElementById('notesSaved'); if(el){el.style.display='inline';setTimeout(function(){el.style.display='none';},3000);} }catch(e){}
  }

  async function loadSolarData(address){
    if(!address||address==='--') return;
    var wrap=null; for(var t=0;t<10;t++){wrap=document.getElementById('solarWrap');if(wrap) break;await new Promise(function(r){setTimeout(r,200);});}
    if(!wrap) return;
    wrap.innerHTML='<div class="card" style="margin-top:16px;"><strong>&#9728;&#65039; Rooftop Solar Intelligence</strong><p style="color:#aaa;font-size:0.75rem;margin-top:8px;">Analyzing rooftop...</p></div>';
    try{
      var geo=await fetch('https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(address)+'&key='+GKEY);
      var gd=await geo.json(); if(gd.status!=='OK'){wrap.innerHTML='';return;}
      var loc=gd.results[0].geometry.location;
      var sat='https://maps.googleapis.com/maps/api/staticmap?center='+encodeURIComponent(address)+'&zoom=19&size=600x200&maptype=satellite&key='+GKEY;
      var sr=await fetch('https://solar.googleapis.com/v1/buildingInsights:findClosest?location.latitude='+loc.lat+'&location.longitude='+loc.lng+'&requiredQuality=LOW&key='+GKEY);
      var s=sr.status===200?(await sr.json()).solarPotential:null;
      var stats='';
      if(s){var maxKw=s.maxArrayPanelsCount?(s.maxArrayPanelsCount*0.4).toFixed(1):'--';var sunHrs=s.maxSunshineHoursPerYear?Math.round(s.maxSunshineHoursPerYear):'--';stats='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-top:12px;">'+solarStat(s.maxArrayPanelsCount||'--','Max Panels')+solarStat(maxKw+' kW','Max Capacity')+solarStat(sunHrs+' hrs','Peak Sun/Yr')+'</div>';}
      wrap.innerHTML='<div class="card" style="margin-top:16px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><strong>&#9728;&#65039; Rooftop Solar Intelligence</strong><span style="font-size:0.62rem;color:#555;">Google Solar API</span></div><img src="'+sat+'" style="width:100%;border-radius:8px;max-height:180px;object-fit:cover;" onerror="this.style.display=\'none\'"/>'+stats+'</div>';
    }catch(e){if(wrap) wrap.innerHTML='<div class="card" style="margin-top:16px;font-size:0.78rem;color:#aaa;">Solar data unavailable for this address.</div>';}
  }

  function solarStat(val,label){ return '<div style="text-align:center;background:rgba(255,255,255,0.03);border-radius:8px;padding:10px 4px;"><div style="font-size:0.95rem;font-weight:700;color:#8DC63F;">'+val+'</div><div style="font-size:0.6rem;color:#aaa;margin-top:3px;">'+label+'</div></div>'; }

    // Restore rep/tech session
    var saved = sessionStorage.getItem('user');

      var cleanUc=uc.trim().replace(/[^0-9]/g,'');

      if(cleanUc.length>11) cleanUc=cleanUc.slice(-10);
      document.getElementById('emailInput').value=decodeURIComponent(ue).toLowerCase().trim();
      document.getElementById('codeInput').value=cleanUc||uc;

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBedpPe3461c1mYiD8yxjDMkYvrJ4MQQpc&libraries=places" async defer>
  // ── SALES REP DASHBOARD ────────────────────────────────────────────────────
  async function loadRepDashboard(rep) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('userName').textContent = rep.name + ' · Sales Rep';
    document.getElementById('dashBody').innerHTML = '<p style="color:#aaa;padding:20px 0;">Loading your leads...</p>';

    var client;
    try { client = supabase.createClient(SUPA_URL, SUPA_KEY); }
    catch(e) { document.getElementById('dashBody').innerHTML = '<p style="color:#ef4444;">Database error.</p>'; return; }

    // Load leads assigned to this rep (by setter_name or assigned_rep field)
    var resp = await client.from('customers').select('*')
      .or('setter_name.eq.' + rep.name + ',assigned_rep.eq.' + rep.id)
      .order('created_at', {ascending:false});
    var leads = resp.data || [];

    var repView = 'leads'; // leads | commissions

    function renderRepView() {
      var newLeads     = leads.filter(function(l){ return !l.step || l.step <= 1; });
      var activeLeads  = leads.filter(function(l){ return l.step >= 2 && l.step < 6; });
      var closedLeads  = leads.filter(function(l){ return l.step >= 6; });
      var totalComm    = closedLeads.reduce(function(s, l){ return s + calcRepCommission(l); }, 0);
      var pendingComm  = activeLeads.reduce(function(s, l){ return s + calcRepCommission(l); }, 0);

      var listLeads = repView === 'leads' ? leads : closedLeads;

      var html = '<div class="rep-header">' +
        '<div><div class="rep-name">' + rep.name + '</div><div style="font-size:0.72rem;color:#666;">Sales Representative</div></div>' +
        '<div class="rep-stats">' +
          '<div class="rep-stat"><div class="rep-stat-val">' + leads.length + '</div><div class="rep-stat-lbl">Total</div></div>' +
          '<div class="rep-stat"><div class="rep-stat-val">' + activeLeads.length + '</div><div class="rep-stat-lbl">Active</div></div>' +
          '<div class="rep-stat"><div class="rep-stat-val">' + closedLeads.length + '</div><div class="rep-stat-lbl">Closed</div></div>' +
        '</div></div>' +

        '<div class="rep-tabs">' +
          '<div class="rep-tab ' + (repView==='leads'?'active':'') + '" onclick="repViewSwitch('leads')">My Leads</div>' +
          '<div class="rep-tab ' + (repView==='commissions'?'active':'') + '" onclick="repViewSwitch('commissions')">Commissions</div>' +
        '</div>';

      if (repView === 'commissions') {
        html += '<div class="rep-commission-bar">' +
          '<div class="rep-comm-row"><span class="rep-comm-label">Closed Jobs</span><span>' + closedLeads.length + '</span></div>' +
          '<div class="rep-comm-row"><span class="rep-comm-label">Earned (Paid)</span><span>$' + totalComm.toLocaleString() + '</span></div>' +
          '<div class="rep-comm-row"><span class="rep-comm-label">Pending (Active)</span><span>$' + pendingComm.toLocaleString() + '</span></div>' +
          '<div class="rep-comm-row"><span class="rep-comm-label">Total Pipeline Value</span><span>$' + (totalComm + pendingComm).toLocaleString() + '</span></div>' +
        '</div>';
        listLeads = closedLeads;
      }

      html += '<div class="rep-pipeline">';
      if (!listLeads.length) {
        html += '<div style="text-align:center;padding:32px;color:#555;">No leads yet. Start adding!</div>';
      } else {
        listLeads.forEach(function(l) {
          var stageLbl = l.step<=1?'New':l.step<=3?'Evaluation':l.step<=5?'Active Job':'Complete';
          var stageCls = l.step<=1?'stage-new':l.step<=3?'stage-active':l.step<=5?'stage-active':'stage-complete';
          var comm = calcRepCommission(l);
          html += '<div class="rep-lead-card">' +
            '<div><div class="rep-lead-name">' + (l.first_name||'') + ' ' + (l.last_name||'') + '</div>' +
            '<div class="rep-lead-detail">' + (l.address||l.phone||'No address') + ' · ' + (l.utility||'') + '</div>' +
            '<div class="rep-lead-detail" style="color:#8DC63F;margin-top:4px;">Commission: $' + comm.toLocaleString() + '</div></div>' +
            '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">' +
            '<span class="rep-lead-stage ' + stageCls + '">' + stageLbl + '</span>' +
            (l.phone ? '<a href="tel:' + l.phone.replace(/\D/g,'') + '" class="tech-btn tech-btn-call" style="font-size:0.68rem;padding:5px 12px;">Call</a>' : '') +
            '</div></div>';
        });
      }
      html += '</div>';
      document.getElementById('dashBody').innerHTML = html;
    }

    window.repViewSwitch = function(v) { repView = v; renderRepView(); };
    renderRepView();
  }

  function calcRepCommission(lead) {
    // Base commission structure — adjust as needed
    var amt = parseFloat(lead.invoice_amount) || 0;
    if (!amt && lead.step >= 6) amt = 500; // default if no invoice
    var rate = 0.10; // 10% base commission
    if (lead.install_type === 'battery') rate = 0.08;
    if (lead.install_type === 'diagnostic') rate = 0.15;
    return Math.round(amt * rate);
  }


  // ── TECH / FIELD DASHBOARD ─────────────────────────────────────────────────

        var postChecks = ['Tools packed & site clean','Job notes updated in portal','Photos uploaded to portal','Customer signed off'];

        function checkHtml(items, phase) {

      // Reload photos for open job
      if (activeJobId) {
        currentJobId = activeJobId;
        loadJobPhotos(activeJobId).then(renderTechView);
      }
    }

    window.toggleTechJob = function(jid) {
      activeJobId = (activeJobId === jid) ? null : jid;
      if (activeJobId) { currentJobId = activeJobId; loadJobPhotos(activeJobId).then(renderTechView); }
      else renderTechView();
    };

    window.setTechJob = function(jid) { currentJobId = jid; activeJobId = jid; };

    window.handleTechPhotoDrop = function(event, jid) {
      event.preventDefault();
      currentJobId = jid; activeJobId = jid;
      var files = Array.from(event.dataTransfer.files).filter(function(f){ return f.type.startsWith('image/'); });
      uploadPhotos(files).then(renderTechView);
    };

    window.toggleCheck = function(jid, key) {
      var checkKey = 'job_' + jid;
      if (!checklistState[checkKey]) checklistState[checkKey] = {};
      checklistState[checkKey][key] = !checklistState[checkKey][key];
      sessionStorage.setItem('checklist_' + tech.id, JSON.stringify(checklistState));
      renderTechView();
    };

    window.saveTechNotes = async function(jid) {
      var notes = (document.getElementById('techNotes_' + jid)||{}).value || '';
      var client2 = supabase.createClient(SUPA_URL, SUPA_KEY);
      var r = await client2.from('customers').update({job_notes: notes}).eq('id', jid);
      var btn = document.querySelector('.tech-save-btn');
      if (btn) { btn.textContent = '✓ Saved'; btn.style.background = '#555'; setTimeout(function(){ btn.textContent = '💾 Save Notes'; btn.style.background = '#8DC63F'; }, 2000); }
    };

    renderTechView();
  }

</script>
</body>
</html>
