<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>FIXMy.Energy — Business Model</title>
<style>
  :root {
    --green:#8DC63F;
    --green-dim:rgba(141,198,63,0.12);
    --green-border:rgba(141,198,63,0.25);
    --bg:#0f1010;
    --surface:rgba(255,255,255,0.04);
    --border:rgba(255,255,255,0.08);
    --text:#F3EDE3;
    --muted:#888;
    --dim:#555;
    --blue:#4a9eff;
    --orange:#f97316;
    --red:#ef4444;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}
  a{color:var(--green);text-decoration:none;}
  a:hover{text-decoration:underline;}

  /* Layout */
  .page{max-width:860px;margin:0 auto;padding:32px 20px 80px;}

  /* Header */
  .site-header{border-bottom:1px solid var(--border);padding-bottom:24px;margin-bottom:32px;}
  .site-header .logo{font-size:1.4rem;font-weight:800;color:var(--green);letter-spacing:-0.02em;}
  .site-header .sub{font-size:0.75rem;color:var(--muted);margin-top:2px;letter-spacing:0.04em;text-transform:uppercase;}
  .site-header .meta{font-size:0.7rem;color:var(--dim);margin-top:8px;}

  /* Section nav */
  .section-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:40px;}
  .section-nav a{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:100px;color:var(--muted);text-decoration:none;transition:all 0.15s;}
  .section-nav a:hover{border-color:var(--green-border);color:var(--green);background:var(--green-dim);}

  /* Section */
  .section{margin-bottom:48px;}
  .section-title{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--green);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--green-border);}
  h2{font-size:1.05rem;font-weight:700;margin-bottom:12px;}
  h3{font-size:0.85rem;font-weight:700;color:var(--text);margin:16px 0 8px;}
  p{color:rgba(243,237,227,0.8);margin-bottom:10px;font-size:0.85rem;}
  ul,ol{padding-left:18px;margin-bottom:10px;}
  li{font-size:0.85rem;color:rgba(243,237,227,0.8);margin-bottom:4px;}
  strong{color:var(--text);font-weight:600;}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:10px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
  .stat-card .val{font-size:1.4rem;font-weight:800;color:var(--green);}
  .stat-card .lbl{font-size:0.7rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.05em;}
  .stat-card .note{font-size:0.7rem;color:var(--dim);margin-top:4px;}

  /* Tables */
  .tbl-wrap{overflow-x:auto;margin-bottom:12px;}
  table{width:100%;border-collapse:collapse;font-size:0.8rem;}
  th{background:rgba(141,198,63,0.08);border-bottom:1px solid var(--green-border);padding:7px 10px;text-align:left;color:var(--green);font-weight:700;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em;}
  td{border-bottom:1px solid var(--border);padding:8px 10px;color:rgba(243,237,227,0.85);}
  tr:last-child td{border-bottom:none;}
  td strong{color:var(--green);}

  /* Badges */
  .badge{display:inline-flex;align-items:center;font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:0.05em;}
  .badge-green{background:rgba(141,198,63,0.12);border:1px solid rgba(141,198,63,0.3);color:var(--green);}
  .badge-blue{background:rgba(74,158,255,0.1);border:1px solid rgba(74,158,255,0.25);color:var(--blue);}
  .badge-orange{background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.25);color:var(--orange);}
  .badge-red{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:var(--red);}

  /* Checklist */
  .checklist{list-style:none;padding:0;}
  .checklist li{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:0.82rem;color:rgba(243,237,227,0.8);}
  .checklist li:last-child{border-bottom:none;}
  .checklist li input[type=checkbox]{width:15px;height:15px;accent-color:var(--green);margin-top:2px;flex-shrink:0;cursor:pointer;}
  .checklist li.done{color:var(--dim);text-decoration:line-through;}

  /* Phase blocks */
  .phase{border-left:3px solid var(--green-border);padding:12px 16px;margin-bottom:12px;background:var(--surface);border-radius:0 10px 10px 0;}
  .phase-label{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--green);margin-bottom:6px;}
  .phase-goal{font-size:0.78rem;font-weight:700;color:var(--text);margin-bottom:8px;}

  /* Print */
  @media print{
    body{background:#fff;color:#111;}
    .section-nav{display:none;}
    .card,.stat-card,.phase{border-color:#ccc;background:#fafafa;}
    th{background:#f2f2f2;color:#333;}
    td{color:#333;}
    .section-title{color:#3a7a18;}
    .stat-card .val{color:#3a7a18;}
  }

  /* Responsive */
  @media(max-width:600px){
    .card-grid{grid-template-columns:1fr 1fr;}
    .page{padding:20px 16px 60px;}
  }
</style>
</head>
<body>
<div class="page" id="bm-root">
